<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestiónObra</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f1f5f9; color: #1e293b; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb !important; }
    select option { background: #fff; color: #1e293b; }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(14px) } to { opacity:1; transform:translateY(0) } }
    @keyframes shake   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px) } to { opacity:1; transform:translateY(0) } }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin    { to { transform:rotate(360deg) } }
  </style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";

// ─── CONFIGURACIÓN ────────────────────────────────────────────
// Pegá aquí la URL de tu Google Apps Script publicado:
const API_URL = "https://script.google.com/macros/s/AKfycbxICW4cXDPleIQeGyaTx8O5A9_N0rxZpXT7DG4-Wz0qcBi9PU-4gY9i0Eu5vxt15m9yoA/exec";

// Credenciales de acceso
const CRED_USER = "ivandimiero";
const CRED_PASS = "Salta1954";

// ─── REACT HELPERS ───────────────────────────────────────────
const { useState, useEffect, useCallback, createElement: h } = React;

// ─── THEME ───────────────────────────────────────────────────
const T = {
  bg:"#f1f5f9", surface:"#ffffff", surfaceAlt:"#f8fafc",
  border:"#e2e8f0", borderMid:"#cbd5e1",
  text:"#1e293b", textMid:"#475569", textSoft:"#94a3b8",
  accent:"#2563eb", accentBg:"#eff6ff",
};

// ─── HELPERS ─────────────────────────────────────────────────
function parseMoney(s) {
  if (s === null || s === undefined || s === "") return 0;
  return parseInt(String(s).replace(/\./g,"").replace(/[^\d]/g,""), 10) || 0;
}
function fmt(v) {
  return parseMoney(v).toLocaleString("es-AR", { minimumFractionDigits:0, maximumFractionDigits:0 });
}
function today() { return new Date().toISOString().split("T")[0]; }
function addMonths(dateStr, n) {
  const d = new Date((dateStr || today()) + "T12:00:00");
  d.setMonth(d.getMonth() + n);
  return d.toISOString().split("T")[0];
}

const STATUS = {
  urgente:    { label:"A Iniciar – Urgente", color:"#dc2626", bg:"#fef2f2", text:"#991b1b", dot:"#ef4444" },
  pendiente:  { label:"Pendiente",           color:"#d97706", bg:"#fffbeb", text:"#92400e", dot:"#f59e0b" },
  en_curso:   { label:"En Curso",            color:"#0284c7", bg:"#f0f9ff", text:"#075985", dot:"#38bdf8" },
  finalizado: { label:"Finalizado",          color:"#16a34a", bg:"#f0fdf4", text:"#166534", dot:"#4ade80" },
};

// ─── API CLIENT ───────────────────────────────────────────────
const api = {
  get: async (action) => {
    const res = await fetch(API_URL + "?action=" + action);
    return res.json();
  },
  post: async (action, payload) => {
    const body = Object.assign({ action }, payload);
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(body),
    });
    return res.json();
  },
};

// ─── MONEY INPUT ─────────────────────────────────────────────
function MoneyInput({ value, onChange, placeholder, style: ext }) {
  const [raw, setRaw] = useState(() => { const n = parseMoney(value); return n ? String(n) : ""; });
  const [focused, setFocused] = useState(false);
  useEffect(() => {
    if (!focused) { const n = parseMoney(value); setRaw(n ? String(n) : ""); }
  }, [value, focused]);
  const handleChange = (e) => {
    const digits = e.target.value.replace(/[^\d]/g, "");
    setRaw(digits);
    onChange(digits === "" ? "" : parseInt(digits, 10));
  };
  const display = raw ? parseInt(raw, 10).toLocaleString("es-AR", { maximumFractionDigits:0 }) : "";
  return h("input", {
    type:"text", inputMode:"numeric", value:display,
    placeholder: placeholder || "0",
    onChange: handleChange,
    onFocus: (e) => { setFocused(true); setTimeout(() => e.target.select(), 0); },
    onBlur: () => setFocused(false),
    style: Object.assign({ fontVariantNumeric:"tabular-nums" }, ext || {}),
  });
}

// ─── SPINNER ─────────────────────────────────────────────────
function Spinner({ size, color }) {
  return h("div", { style:{
    width: size||20, height: size||20,
    border: "2px solid " + (color||T.accent) + "33",
    borderTop: "2px solid " + (color||T.accent),
    borderRadius:"50%", animation:"spin 0.7s linear infinite", display:"inline-block"
  }});
}

// ─── CUOTAS MODAL ────────────────────────────────────────────
function CuotasModal({ trabajo, onSave, onClose }) {
  const montoBase = parseMoney(trabajo.monto);
  const [anticipo, setAnticipo] = useState(parseMoney(trabajo.anticipo));
  const [cuotas, setCuotas] = useState(() => {
    if (trabajo.cuotas && trabajo.cuotas.length)
      return trabajo.cuotas.map(c => Object.assign({}, c, { monto: parseMoney(c.monto) }));
    const n = Math.max(1, parseInt(trabajo.cantCuotas)||1);
    const saldo = montoBase - parseMoney(trabajo.anticipo);
    return Array.from({length:n}, (_,i) => ({ id:i+1, fecha:addMonths(trabajo.fecha||today(),i+1), indefinida:false, monto:Math.round(saldo/n), pagada:false }));
  });

  function recalcular(nuevoAnticipo) {
    const saldo = montoBase - nuevoAnticipo;
    const n = cuotas.length;
    setCuotas(cuotas.map(c => Object.assign({}, c, { monto: n>0 ? Math.round(saldo/n) : 0 })));
  }
  function handleAnticipo(val) {
    const v = val===""?0:parseMoney(val);
    setAnticipo(v); recalcular(v);
  }
  function addCuota() {
    const last = cuotas[cuotas.length-1];
    setCuotas([...cuotas, { id:Date.now(), pagada:false, indefinida:false, monto:0,
      fecha: last&&!last.indefinida ? addMonths(last.fecha,1) : addMonths(today(),1) }]);
  }
  function removeCuota(id) { setCuotas(cuotas.filter(c=>c.id!==id)); }
  function upd(id, field, val) { setCuotas(cuotas.map(c=>c.id===id ? Object.assign({},c,{[field]:val}) : c)); }

  const total = cuotas.reduce((s,c)=>s+parseMoney(c.monto),0);
  const diff  = total - (montoBase - anticipo);
  const inBase = { background:T.surfaceAlt, border:"1px solid "+T.border, borderRadius:8, padding:"7px 10px", color:T.text, fontSize:13, outline:"none", width:"100%" };

  return h("div", { style:{ position:"fixed",inset:0,background:"rgba(15,23,42,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(4px)" }},
    h("div", { style:{ background:T.surface,border:"1px solid "+T.border,borderRadius:16,padding:28,width:"min(600px,95vw)",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.15)" }},

      // Header
      h("div", { style:{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20 }},
        h("div", null,
          h("h3", { style:{ color:T.text,fontSize:18,fontWeight:700,margin:0,fontFamily:"'DM Serif Display',serif" }}, "Gestión de Cuotas"),
          h("p",  { style:{ color:T.textMid,fontSize:12,margin:"4px 0 0" }}, trabajo.obra)
        ),
        h("button", { onClick:onClose, style:{ background:"none",border:"none",color:T.textSoft,fontSize:22,cursor:"pointer" }}, "✕")
      ),

      // Resumen
      h("div", { style:{ background:T.surfaceAlt,borderRadius:12,padding:"14px 18px",marginBottom:20,border:"1px solid "+T.border }},
        h("div", { style:{ display:"flex",gap:20,flexWrap:"wrap",alignItems:"flex-end" }},
          h("div", null,
            h("p", { style:{ color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.07em",margin:0 }}, "MONTO TOTAL"),
            h("p", { style:{ color:T.text,fontWeight:700,margin:"3px 0 0",fontSize:16,fontVariantNumeric:"tabular-nums" }}, "$ " + fmt(montoBase))
          ),
          h("div", null,
            h("p", { style:{ color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.07em",margin:"0 0 4px" }}, "ANTICIPO (editable)"),
            h(MoneyInput, { value:anticipo, onChange:handleAnticipo, style:Object.assign({},inBase,{width:130,fontWeight:700,color:"#d97706",fontSize:14}) })
          ),
          h("div", null,
            h("p", { style:{ color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.07em",margin:0 }}, "SALDO A FINANCIAR"),
            h("p", { style:{ color:T.accent,fontWeight:700,margin:"3px 0 0",fontSize:16,fontVariantNumeric:"tabular-nums" }}, "$ " + fmt(montoBase - anticipo))
          )
        ),
        h("p", { style:{ color:T.textSoft,fontSize:11,margin:"10px 0 0" }}, "💡 Modificar el anticipo recalcula automáticamente todas las cuotas.")
      ),

      // Columnas
      h("div", { style:{ display:"grid",gridTemplateColumns:"24px 1fr 130px 90px 90px 28px",gap:6,paddingBottom:6,borderBottom:"1px solid "+T.border,marginBottom:8 }},
        ["#","Fecha de cobro","Monto ($)","","",""].map((hdr,i) =>
          h("span", { key:i, style:{ color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.06em" }}, hdr)
        )
      ),

      // Filas cuotas
      cuotas.map((c,i) =>
        h("div", { key:c.id, style:{ display:"grid",gridTemplateColumns:"24px 1fr 130px 90px 90px 28px",gap:6,alignItems:"center",marginBottom:7 }},
          h("span", { style:{ color:T.textSoft,fontSize:12,textAlign:"right" }}, i+1),
          h("div", { style:{ display:"flex",gap:5,alignItems:"center" }},
            c.indefinida
              ? h("span", { style:{ flex:1,padding:"7px 10px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,fontSize:13,color:T.textMid }}, "Indefinida")
              : h("input", { type:"date", value:c.fecha, onChange:e=>upd(c.id,"fecha",e.target.value),
                  style:{ flex:1,background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"7px 10px",color:T.text,fontSize:13,outline:"none" } }),
            h("label", { style:{ display:"flex",alignItems:"center",gap:3,cursor:"pointer",fontSize:11,color:T.textSoft,whiteSpace:"nowrap" }},
              h("input", { type:"checkbox", checked:!!c.indefinida, onChange:e=>upd(c.id,"indefinida",e.target.checked), style:{ accentColor:T.accent,cursor:"pointer" } }),
              "Indef."
            )
          ),
          h(MoneyInput, { value:c.monto, onChange:v=>upd(c.id,"monto",v===""?0:v), style:inBase }),
          h("button", { onClick:()=>upd(c.id,"pagada",!c.pagada), style:{ padding:"6px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:c.pagada?"#dcfce7":"#fef9ec",color:c.pagada?"#15803d":"#b45309" }},
            c.pagada ? "✓ PAG." : "PEND."
          ),
          h("button", { onClick:()=>removeCuota(c.id), style:{ background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:20,padding:0,textAlign:"center",lineHeight:1 }}, "×")
        )
      ),

      h("button", { onClick:addCuota, style:{ width:"100%",padding:"8px",background:"transparent",border:"1px dashed "+T.borderMid,borderRadius:8,color:T.textMid,cursor:"pointer",marginTop:4,fontSize:13 }}, "+ Agregar cuota"),

      // Footer
      h("div", { style:{ display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16,paddingTop:16,borderTop:"1px solid "+T.border }},
        h("span", { style:{ fontSize:13,fontWeight:600,color:Math.abs(diff)<2?"#16a34a":diff>0?"#dc2626":"#d97706" }},
          "Total: $ " + fmt(total) + (Math.abs(diff)<2?" ✓":diff>0?" (excede $"+fmt(diff)+")":" (faltan $"+fmt(-diff)+")")
        ),
        h("div", { style:{ display:"flex",gap:8 }},
          h("button", { onClick:onClose, style:{ padding:"8px 18px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,cursor:"pointer",fontSize:13 }}, "Cancelar"),
          h("button", { onClick:()=>onSave(cuotas,anticipo), style:{ padding:"8px 20px",background:T.accent,border:"none",borderRadius:8,color:"white",cursor:"pointer",fontSize:13,fontWeight:600 }}, "Guardar")
        )
      )
    )
  );
}

// ─── TRABAJO CARD ─────────────────────────────────────────────
function TrabajoCard({ t, onDelete, onStatusChange, onCuotasModal, onFactura, saving }) {
  const [open, setOpen] = useState(false);
  const [editFac, setEditFac] = useState(false);
  const [facVal, setFacVal]   = useState("");

  const st = STATUS[t.estado] || STATUS.pendiente;
  const monto    = parseMoney(t.monto);
  const anticipo = parseMoney(t.anticipo);
  const saldo    = monto - anticipo;
  const cuotasPag = (t.cuotas||[]).filter(c=>c.pagada).length;
  const cuotasTot = (t.cuotas||[]).length;
  const cobrado   = (t.cuotas||[]).filter(c=>c.pagada).reduce((s,c)=>s+parseMoney(c.monto),0);
  const pendiente = saldo - cobrado;

  return h("div", { style:{ background:T.surface,border:"1px solid "+T.border,borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",opacity:saving?0.7:1,transition:"opacity 0.2s" }},

    // ── Header colapsable ──
    h("div", { onClick:()=>setOpen(o=>!o), style:{ display:"flex",alignItems:"center",cursor:"pointer",userSelect:"none" }},
      h("div", { style:{ width:6,alignSelf:"stretch",background:st.dot,borderRadius:"14px 0 0 14px",flexShrink:0 } }),
      h("div", { style:{ flex:1,display:"flex",alignItems:"center",gap:12,padding:"13px 16px" }},
        h("div", { style:{ width:36,height:36,borderRadius:10,background:st.bg,border:"1.5px solid "+st.color+"55",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }},
          h("div", { style:{ width:14,height:14,borderRadius:"50%",background:st.dot,boxShadow:"0 0 6px "+st.dot+"88" } })
        ),
        h("div", { style:{ flex:1,minWidth:0 }},
          h("div", { style:{ display:"flex",alignItems:"center",gap:8,flexWrap:"wrap" }},
            h("span", { style:{ fontWeight:700,color:T.text,fontSize:14,fontFamily:"'DM Serif Display',serif" }}, t.obra),
            h("span", { style:{ padding:"1px 8px",borderRadius:20,background:st.bg,color:st.text,fontSize:10,fontWeight:700,border:"1px solid "+st.color+"44" }}, st.label),
            t.facturado && h("span", { style:{ padding:"1px 8px",borderRadius:20,background:"#f0fdf4",color:"#166534",fontSize:10,fontWeight:700,border:"1px solid #bbf7d0" }}, "🧾 #"+t.nroFactura)
          ),
          h("p", { style:{ margin:"2px 0 0",color:T.textSoft,fontSize:11 }},
            t.fecha + (t.descripcion ? " · " + t.descripcion.slice(0,55) + (t.descripcion.length>55?"…":"") : "")
          )
        ),
        h("div", { style:{ display:"flex",gap:16,flexShrink:0,marginRight:4 }},
          h("div", { style:{ textAlign:"right" }},
            h("p", { style:{ margin:0,color:T.textSoft,fontSize:10,fontWeight:600 }}, "TOTAL"),
            h("p", { style:{ margin:0,color:T.text,fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums" }}, "$ "+fmt(monto))
          ),
          h("div", { style:{ textAlign:"right" }},
            h("p", { style:{ margin:0,color:T.textSoft,fontSize:10,fontWeight:600 }}, "PENDIENTE"),
            h("p", { style:{ margin:0,color:pendiente>0?"#dc2626":"#16a34a",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums" }}, "$ "+fmt(pendiente))
          ),
          cuotasTot>0 && h("div", { style:{ textAlign:"right" }},
            h("p", { style:{ margin:0,color:T.textSoft,fontSize:10,fontWeight:600 }}, "CUOTAS"),
            h("p", { style:{ margin:0,color:T.textMid,fontSize:13,fontWeight:700 }}, cuotasPag+"/"+cuotasTot)
          )
        ),
        h("span", { style:{ color:T.textSoft,fontSize:11,transition:"transform 0.25s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)" }}, "▼")
      )
    ),

    // ── Detalle expandido ──
    open && h("div", { style:{ borderTop:"1px solid "+T.border,padding:"16px 18px 18px",animation:"slideIn 0.2s ease-out" }},

      // Financiero
      h("div", { style:{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }},
        [["Total",fmt(monto),T.text],["Anticipo",fmt(anticipo),"#d97706"],["Saldo",fmt(saldo),T.accent],["Cobrado",fmt(cobrado),"#16a34a"],["Pendiente",fmt(pendiente),pendiente>0?"#dc2626":"#16a34a"]].map(([l,v,c]) =>
          h("div", { key:l, style:{ background:T.surfaceAlt,borderRadius:8,padding:"8px 12px",minWidth:90,border:"1px solid "+T.border }},
            h("p", { style:{ margin:0,color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.06em" }}, l.toUpperCase()),
            h("p", { style:{ margin:"2px 0 0",color:c,fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums" }}, "$ "+v)
          )
        ),
        cuotasTot>0 && h("div", { style:{ background:T.surfaceAlt,borderRadius:8,padding:"8px 12px",minWidth:80,border:"1px solid "+T.border }},
          h("p", { style:{ margin:0,color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.06em" }}, "CUOTAS"),
          h("p", { style:{ margin:"2px 0 0",color:T.textMid,fontSize:13,fontWeight:700 }}, cuotasPag+"/"+cuotasTot)
        )
      ),

      // Detalle cuotas
      cuotasTot>0 && h("div", { style:{ background:T.surfaceAlt,borderRadius:10,padding:"10px 14px",marginBottom:14,border:"1px solid "+T.border }},
        h("p", { style:{ margin:"0 0 8px",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.06em" }}, "DETALLE DE CUOTAS"),
        (t.cuotas||[]).map((c,i) =>
          h("div", { key:c.id, style:{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<cuotasTot-1?"1px dashed "+T.border:"none" }},
            h("span", { style:{ color:T.textMid,fontSize:12 }}, "Cuota "+(i+1)+" · "+(c.indefinida?"Indefinida":c.fecha)),
            h("div", { style:{ display:"flex",gap:10,alignItems:"center" }},
              h("span", { style:{ color:T.text,fontWeight:600,fontSize:12,fontVariantNumeric:"tabular-nums" }}, "$ "+fmt(c.monto)),
              h("span", { style:{ padding:"1px 8px",borderRadius:10,fontSize:10,fontWeight:700,background:c.pagada?"#dcfce7":"#fef9ec",color:c.pagada?"#15803d":"#b45309" }},
                c.pagada?"✓ PAGADA":"PENDIENTE"
              )
            )
          )
        )
      ),

      // Acciones
      h("div", { style:{ display:"flex",gap:8,flexWrap:"wrap",alignItems:"center" }},
        h("select", { value:t.estado, onChange:e=>onStatusChange(t.id,e.target.value),
            style:{ padding:"6px 10px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,fontSize:12,cursor:"pointer",outline:"none" }},
          Object.entries(STATUS).map(([k,v]) => h("option", { key:k, value:k }, v.label))
        ),
        h("button", { onClick:()=>onCuotasModal(t), style:{ padding:"6px 14px",background:T.accentBg,border:"1px solid #bfdbfe",borderRadius:8,color:T.accent,fontSize:12,cursor:"pointer",fontWeight:600 }},
          "💰 Gestionar cuotas"
        ),
        editFac
          ? h("div", { style:{ display:"flex",gap:6 }},
              h("input", { value:facVal, onChange:e=>setFacVal(e.target.value), placeholder:"Nº factura",
                style:{ padding:"6px 10px",background:T.surfaceAlt,border:"1px solid "+T.accent,borderRadius:8,color:T.text,fontSize:12,width:120,outline:"none" } }),
              h("button", { onClick:()=>{ onFactura(t.id,facVal); setEditFac(false); setFacVal(""); },
                style:{ padding:"6px 12px",background:"#10b981",border:"none",borderRadius:8,color:"white",fontSize:12,cursor:"pointer" }}, "✓"),
              h("button", { onClick:()=>setEditFac(false),
                style:{ padding:"6px 12px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,fontSize:12,cursor:"pointer" }}, "✕")
            )
          : h("button", { onClick:()=>{ setEditFac(true); setFacVal(t.nroFactura||""); },
              style:{ padding:"6px 14px",background:t.facturado?"#f0fdf4":T.surfaceAlt,border:"1px solid "+(t.facturado?"#bbf7d0":T.border),borderRadius:8,color:t.facturado?"#16a34a":T.textMid,fontSize:12,cursor:"pointer",fontWeight:t.facturado?600:400 }},
              "🧾 " + (t.facturado?"Factura #"+t.nroFactura:"Registrar factura")
            ),
        h("button", { onClick:()=>onDelete(t.id),
          style:{ marginLeft:"auto",padding:"6px 12px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,color:"#dc2626",fontSize:12,cursor:"pointer" }},
          "🗑 Eliminar"
        )
      )
    )
  );
}

// ─── LOGIN ────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [user,setUser]=useState(""); const [pass,setPass]=useState("");
  const [err,setErr]=useState(""); const [anim,setAnim]=useState("fadeUp 0.5s ease-out");

  function handleSubmit() {
    if (user.trim() === CRED_USER && pass.trim() === CRED_PASS) {
      onLogin();
    } else {
      setErr("Usuario o contraseña incorrectos");
      setAnim("shake 0.4s");
      setTimeout(()=>setAnim("none"),500);
    }
  }

  const inputS = { width:"100%",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:10,padding:"12px 16px",color:T.text,fontSize:15,outline:"none",fontFamily:"'DM Sans',sans-serif" };

  return h("div", { style:{ minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center" }},
    h("div", { style:{ animation:anim,width:"min(400px,92vw)",background:T.surface,border:"1px solid "+T.border,borderRadius:20,padding:40,boxShadow:"0 8px 40px rgba(0,0,0,0.10)" }},
      h("div", { style:{ textAlign:"center",marginBottom:36 }},
        h("div", { style:{ width:56,height:56,background:"linear-gradient(135deg,#2563eb,#4f46e5)",borderRadius:16,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:"0 6px 20px rgba(37,99,235,0.3)" }}, "🏗️"),
        h("h1", { style:{ color:T.text,fontSize:26,fontWeight:400,margin:0,fontFamily:"'DM Serif Display',serif" }}, "GestiónObra"),
        h("p",  { style:{ color:T.textMid,fontSize:13,margin:"6px 0 0" }}, "Sistema de gestión de trabajos y pagos")
      ),
      h("div", { style:{ marginBottom:16 }},
        h("label", { style:{ display:"block",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.08em",marginBottom:8 }}, "USUARIO"),
        h("input", { type:"text", value:user, placeholder:"Usuario", onChange:e=>setUser(e.target.value),
          onKeyDown:e=>e.key==="Enter"&&handleSubmit(), style:inputS,
          onFocus:e=>e.target.style.borderColor="#2563eb", onBlur:e=>e.target.style.borderColor=T.border })
      ),
      h("div", { style:{ marginBottom:24 }},
        h("label", { style:{ display:"block",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.08em",marginBottom:8 }}, "CONTRASEÑA"),
        h("input", { type:"password", value:pass, placeholder:"••••••••", onChange:e=>setPass(e.target.value),
          onKeyDown:e=>e.key==="Enter"&&handleSubmit(), style:inputS,
          onFocus:e=>e.target.style.borderColor="#2563eb", onBlur:e=>e.target.style.borderColor=T.border })
      ),
      err && h("p", { style:{ color:"#ef4444",fontSize:13,textAlign:"center",marginBottom:16,background:"#fef2f2",padding:"8px 12px",borderRadius:8 }}, err),
      h("button", { onClick:handleSubmit, style:{ width:"100%",padding:"13px",background:"linear-gradient(135deg,#2563eb,#4f46e5)",border:"none",borderRadius:10,color:"white",fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 16px rgba(37,99,235,0.3)",fontFamily:"'DM Sans',sans-serif" }},
        "Ingresar →"
      )
    )
  );
}

// ─── APP PRINCIPAL ────────────────────────────────────────────
function App() {
  const [loggedIn,setLoggedIn]=useState(false);
  const [trabajos,setTrabajos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [savingId,setSavingId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [activeTab,setActiveTab]=useState("trabajos");
  const [cuotasModal,setCuotasModal]=useState(null);
  const [apiError,setApiError]=useState("");

  const emptyForm={fecha:today(),obra:"",descripcion:"",estado:"pendiente",monto:"",anticipo:"",cantCuotas:"1"};
  const [form,setForm]=useState(emptyForm);
  const [saved,setSaved]=useState(false);

  const loadTrabajos = useCallback(async () => {
    setLoading(true); setApiError("");
    try {
      const res = await api.get("getAll");
      if (res.error) { setApiError("Error API: "+res.error); setTrabajos([]); }
      else setTrabajos(res.trabajos || []);
    } catch(e) { setApiError("No se pudo conectar con la API. Verificá la URL del script."); }
    setLoading(false);
  }, []);

  useEffect(() => { if (loggedIn) loadTrabajos(); }, [loggedIn]);

  function setField(k,v) { setForm(f=>Object.assign({},f,{[k]:v})); }

  function calcCuotas(monto,anticipo,cant) {
    const s=parseMoney(monto)-parseMoney(anticipo);
    const n=Math.max(1,parseInt(cant)||1);
    return Array.from({length:n},(_,i)=>({ id:i+1,fecha:addMonths(today(),i+1),indefinida:false,monto:Math.round(s/n),pagada:false }));
  }

  async function handleAdd() {
    if (!form.obra.trim()) return;
    setSaving(true);
    const nuevo={ ...form, id:String(Date.now()), monto:parseMoney(form.monto), anticipo:parseMoney(form.anticipo), cantCuotas:parseInt(form.cantCuotas)||1, cuotas:calcCuotas(form.monto,form.anticipo,form.cantCuotas), facturado:false, nroFactura:"" };
    try {
      const res = await api.post("save",{ data:nuevo });
      if (res.ok) { setTrabajos([nuevo,...trabajos]); setForm(emptyForm); setSaved(true); setTimeout(()=>setSaved(false),2000); }
      else setApiError("Error al guardar: "+res.error);
    } catch(e) { setApiError("Error de conexión al guardar."); }
    setSaving(false);
  }

  async function updateRemote(updated) {
    setSavingId(updated.id);
    try {
      const res = await api.post("update",{ data:updated });
      if (!res.ok) setApiError("Error al actualizar: "+res.error);
    } catch(e) { setApiError("Error de conexión al actualizar."); }
    setSavingId(null);
  }

  async function handleDelete(id) {
    if (!confirm("¿Eliminar este trabajo?")) return;
    setSavingId(id);
    try {
      const res = await api.post("delete",{ id });
      if (res.ok) setTrabajos(t=>t.filter(x=>x.id!==id));
      else setApiError("Error al eliminar: "+res.error);
    } catch(e) { setApiError("Error de conexión al eliminar."); }
    setSavingId(null);
  }

  async function handleStatusChange(id,estado) {
    const updated=trabajos.map(t=>t.id===id?Object.assign({},t,{estado}):t);
    setTrabajos(updated);
    await updateRemote(updated.find(t=>t.id===id));
  }

  async function handleSaveCuotas(id,cuotas,anticipo) {
    const updated=trabajos.map(t=>t.id===id?Object.assign({},t,{cuotas,anticipo}):t);
    setTrabajos(updated);
    await updateRemote(updated.find(t=>t.id===id));
    setCuotasModal(null);
  }

  async function handleFactura(id,nro) {
    const updated=trabajos.map(t=>t.id===id?Object.assign({},t,{facturado:true,nroFactura:nro}):t);
    setTrabajos(updated);
    await updateRemote(updated.find(t=>t.id===id));
  }

  const alertas=trabajos.flatMap(t=>{
    const arr=[];
    (t.cuotas||[]).forEach(c=>{
      if(!c.pagada&&!c.indefinida){
        const diff=Math.ceil((new Date(c.fecha)-new Date())/86400000);
        if(diff<=30) arr.push({tipo:"pago",trabajo:t.obra,fecha:c.fecha,monto:c.monto,diff,id:t.id+"-"+c.id});
      }
    });
    if(!t.facturado&&t.estado==="finalizado") arr.push({tipo:"factura",trabajo:t.obra,diff:999,id:"fac-"+t.id});
    return arr;
  }).sort((a,b)=>a.diff-b.diff);

  const inputStyle={ width:"100%",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:10,padding:"10px 14px",color:T.text,fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif" };
  const labelStyle={ display:"block",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:6 };

  if (!loggedIn) return h(Login, { onLogin:()=>setLoggedIn(true) });

  return h("div", { style:{ minHeight:"100vh",background:T.bg,fontFamily:"'DM Sans',sans-serif" }},

    // Header
    h("div", { style:{ background:T.surface,borderBottom:"1px solid "+T.border,padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }},
      h("div", { style:{ display:"flex",alignItems:"center",gap:10 }},
        h("span", { style:{ fontSize:20 }}, "🏗️"),
        h("span", { style:{ fontFamily:"'DM Serif Display',serif",fontSize:18,color:T.text }}, "GestiónObra")
      ),
      h("div", { style:{ display:"flex",gap:4 }},
        [["trabajos","📋 Trabajos"],["alertas","🔔 Alertas"]].map(([k,v]) =>
          h("button", { key:k, onClick:()=>setActiveTab(k), style:{ padding:"5px 12px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:activeTab===k?T.accentBg:"transparent",color:activeTab===k?T.accent:T.textMid,position:"relative" }},
            v,
            k==="alertas"&&alertas.length>0 && h("span", { style:{ position:"absolute",top:4,right:6,width:7,height:7,background:"#ef4444",borderRadius:"50%",animation:"pulse 2s infinite" }})
          )
        ),
        h("button", { onClick:loadTrabajos, title:"Recargar", style:{ padding:"5px 10px",borderRadius:8,border:"1px solid "+T.border,background:"none",cursor:"pointer",fontSize:12,color:T.textMid }}, "↺")
      ),
      h("button", { onClick:()=>setLoggedIn(false), style:{ background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"4px 10px",color:T.textMid,cursor:"pointer",fontSize:11 }}, "Salir")
    ),

    // Error banner
    apiError && h("div", { style:{ background:"#fef2f2",borderBottom:"1px solid #fecaca",padding:"8px 20px",display:"flex",justifyContent:"space-between",alignItems:"center" }},
      h("span", { style:{ color:"#dc2626",fontSize:13 }}, "⚠️ "+apiError),
      h("button", { onClick:()=>setApiError(""), style:{ background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16 }}, "✕")
    ),

    // Tabs
    activeTab==="alertas"
      ? h("div", { style:{ padding:20,maxWidth:800,margin:"0 auto" }},
          h("h2", { style:{ fontFamily:"'DM Serif Display',serif",fontSize:22,margin:"0 0 16px",color:T.text }}, "Centro de Alertas"),
          alertas.length===0
            ? h("div", { style:{ textAlign:"center",padding:50,color:T.textSoft,background:T.surface,borderRadius:16,border:"1px solid "+T.border }},
                h("div", { style:{ fontSize:36,marginBottom:10 }}, "✅"),
                h("p", { style:{ margin:0 }}, "Sin alertas pendientes")
              )
            : alertas.map(a =>
                h("div", { key:a.id, style:{ background:T.surface,border:"1px solid "+(a.tipo==="factura"?"#fde68a":a.diff<=7?"#fecaca":"#bfdbfe"),borderRadius:12,padding:"14px 18px",marginBottom:10,display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }},
                  h("div", { style:{ width:38,height:38,borderRadius:10,background:a.tipo==="factura"?"#fef9c3":a.diff<=7?"#fef2f2":"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0 }},
                    a.tipo==="factura"?"🧾":a.diff<=0?"🚨":a.diff<=7?"⚠️":"📅"
                  ),
                  h("div", { style:{ flex:1 }},
                    h("p", { style:{ margin:0,fontWeight:600,color:T.text,fontSize:14 }}, a.trabajo),
                    a.tipo==="pago"
                      ? h("p", { style:{ margin:"2px 0 0",color:T.textMid,fontSize:12 }},
                          "Cuota $ "+fmt(a.monto)+" · "+(a.diff<=0?"VENCIDA hace "+Math.abs(a.diff)+" días":"Vence en "+a.diff+" día"+(a.diff!==1?"s":"")+" ("+a.fecha+")")
                        )
                      : h("p", { style:{ margin:"2px 0 0",color:"#d97706",fontSize:12 }}, "Trabajo finalizado sin facturar")
                  )
                )
              )
        )
      : h("div", { style:{ display:"flex",height:"calc(100vh - 56px)",overflow:"hidden" }},

          // Panel izquierdo
          h("div", { style:{ width:280,minWidth:280,background:T.surface,borderRight:"1px solid "+T.border,padding:16,overflowY:"auto" }},
            h("h3", { style:{ fontFamily:"'DM Serif Display',serif",fontSize:17,margin:"0 0 16px",color:T.text }}, "Nueva Entrada"),

            ...[
              ["FECHA",     h("input",{type:"date",value:form.fecha,onChange:e=>setField("fecha",e.target.value),style:inputStyle})],
              ["OBRA / PROYECTO", h("input",{value:form.obra,onChange:e=>setField("obra",e.target.value),placeholder:"Nombre de la obra",style:inputStyle})],
            ].map(([lbl,el]) => h("div",{key:lbl,style:{marginBottom:12}}, h("label",{style:labelStyle},lbl), el)),

            h("div", { style:{ marginBottom:12 }},
              h("label", { style:labelStyle }, "DESCRIPCIÓN"),
              h("textarea", { value:form.descripcion,onChange:e=>setField("descripcion",e.target.value),placeholder:"Detalles...",rows:2,style:Object.assign({},inputStyle,{resize:"vertical",lineHeight:1.5}) })
            ),
            h("div", { style:{ marginBottom:12 }},
              h("label", { style:labelStyle }, "ESTADO"),
              h("select", { value:form.estado,onChange:e=>setField("estado",e.target.value),style:Object.assign({},inputStyle,{cursor:"pointer"}) },
                Object.entries(STATUS).map(([k,v])=>h("option",{key:k,value:k},v.label))
              )
            ),
            h("div",{style:{marginBottom:12}}, h("label",{style:labelStyle},"MONTO ($)"), h(MoneyInput,{value:form.monto,onChange:v=>setField("monto",v),style:inputStyle})),
            h("div",{style:{marginBottom:12}}, h("label",{style:labelStyle},"ANTICIPO ($)"), h(MoneyInput,{value:form.anticipo,onChange:v=>setField("anticipo",v),style:inputStyle})),

            parseMoney(form.monto)>0 && h("div", { style:{ background:T.accentBg,borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,border:"1px solid #bfdbfe" }},
              h("div", { style:{ display:"flex",justifyContent:"space-between",color:T.textMid,marginBottom:2 }},
                h("span",null,"Saldo"), h("span",{style:{color:T.accent,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(parseMoney(form.monto)-parseMoney(form.anticipo)))
              ),
              parseInt(form.cantCuotas)>0 && h("div", { style:{ display:"flex",justifyContent:"space-between",color:T.textMid }},
                h("span",null,"Por cuota"), h("span",{style:{color:"#059669",fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(Math.round((parseMoney(form.monto)-parseMoney(form.anticipo))/(parseInt(form.cantCuotas)||1))))
              )
            ),

            h("div",{style:{marginBottom:16}}, h("label",{style:labelStyle},"CANT. CUOTAS"),
              h("input",{type:"number",min:1,max:60,value:form.cantCuotas,onChange:e=>setField("cantCuotas",e.target.value),style:inputStyle})
            ),

            h("button", { onClick:handleAdd, disabled:saving, style:{ width:"100%",padding:"11px",background:saved?"linear-gradient(135deg,#10b981,#059669)":"linear-gradient(135deg,#2563eb,#4f46e5)",border:"none",borderRadius:10,color:"white",fontSize:13,fontWeight:600,cursor:saving?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 4px 14px rgba(37,99,235,0.25)",fontFamily:"'DM Sans',sans-serif" }},
              saving ? [h(Spinner,{key:"sp",size:16,color:"white"})," Guardando…"] : saved ? "✓ Guardado" : "+ Agregar Trabajo"
            ),

            h("div", { style:{ marginTop:16,padding:"8px 12px",background:T.surfaceAlt,borderRadius:8,border:"1px solid "+T.border,textAlign:"center" }},
              h("p", { style:{ color:T.textSoft,fontSize:11,margin:0 }}, "☁️ Google Sheets · "+trabajos.length+" trabajo"+(trabajos.length!==1?"s":""))
            )
          ),

          // Panel derecho
          h("div", { style:{ flex:1,overflowY:"auto",padding:16 }},
            loading
              ? h("div", { style:{ textAlign:"center",padding:60,color:T.textSoft,display:"flex",flexDirection:"column",alignItems:"center",gap:16 }},
                  h(Spinner,{size:32}), h("p",null,"Cargando desde Google Sheets…")
                )
              : trabajos.length===0
                ? h("div", { style:{ textAlign:"center",padding:60,color:T.textSoft,background:T.surface,borderRadius:16,border:"1px solid "+T.border,maxWidth:460,margin:"20px auto" }},
                    h("div",{style:{fontSize:36,marginBottom:10}},"📋"),
                    h("p",{style:{margin:0,fontSize:15,color:T.textMid}},"Sin trabajos registrados"),
                    h("p",{style:{margin:"6px 0 0",fontSize:12}},"Agregá tu primer trabajo desde el panel izquierdo")
                  )
                : trabajos.map(t =>
                    h(TrabajoCard, { key:t.id, t, saving:savingId===t.id,
                      onDelete:handleDelete, onStatusChange:handleStatusChange,
                      onCuotasModal:setCuotasModal, onFactura:handleFactura })
                  )
          )
        ),

    cuotasModal && h(CuotasModal, {
      trabajo:cuotasModal,
      onSave:(cuotas,ant)=>handleSaveCuotas(cuotasModal.id,cuotas,ant),
      onClose:()=>setCuotasModal(null)
    })
  );
}

// ─── RENDER ───────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));
</script>
</body>
</html>
