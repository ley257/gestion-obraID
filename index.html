<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GestiónObra</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f1f5f9; color: #1e293b; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 3px; }
    input[type=date]::-webkit-calendar-picker-indicator { opacity:0.5; cursor:pointer; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:#2563eb !important; }
    select option { background:#fff; color:#1e293b; }
    @keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shake   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-7px)} 40%,80%{transform:translateX(7px)} }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin    { to{transform:rotate(360deg)} }

    /* ── Mobile layout ── */
    .main-layout { display:flex; height:calc(100vh - 56px); overflow:hidden; }
    .left-panel  { width:280px; min-width:280px; background:#fff; border-right:1px solid #e2e8f0; padding:16px; overflow-y:auto; flex-shrink:0; }
    .right-panel { flex:1; overflow-y:auto; padding:16px; }

    @media (max-width: 700px) {
      .main-layout { flex-direction:column; height:auto; overflow:visible; }
      .left-panel  { width:100%; min-width:0; border-right:none; border-bottom:1px solid #e2e8f0; padding:14px; }
      .right-panel { padding:12px; }
      .card-header-row { flex-wrap:wrap; gap:6px !important; }
      .card-money-quick { display:none !important; }
      .card-money-quick-mobile { display:flex !important; }
      .modal-grid { grid-template-columns: 20px 1fr 100px 72px 26px !important; }
      .modal-box { padding:18px !important; width:calc(100vw - 24px) !important; }
      .fin-grid { grid-template-columns: repeat(3, 1fr) !important; }
    }
    .card-money-quick-mobile { display:none; gap:10px; margin-top:6px; flex-wrap:wrap; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";

// ══════════════════════════════════════════════════════════════
//  CONFIGURACIÓN
// ══════════════════════════════════════════════════════════════
const API_URL   = "https://script.google.com/macros/s/AKfycbxICW4cXDPleIQeGyaTx8O5A9_N0rxZpXT7DG4-Wz0qcBi9PU-4gY9i0Eu5vxt15m9yoA/exec";
const CRED_USER = "ivandimiero";
const CRED_PASS = "Salta1954";

// ── React ────────────────────────────────────────────────────
const { useState, useEffect, useCallback, useMemo, createElement:h } = React;

// ── Theme ────────────────────────────────────────────────────
const T = {
  bg:"#f1f5f9", surface:"#fff", surfaceAlt:"#f8fafc",
  border:"#e2e8f0", borderMid:"#cbd5e1",
  text:"#1e293b", textMid:"#475569", textSoft:"#94a3b8",
  accent:"#2563eb", accentBg:"#eff6ff",
};

const STATUS = {
  urgente:    { label:"A Iniciar – Urgente", color:"#dc2626", bg:"#fef2f2", text:"#991b1b", dot:"#ef4444" },
  pendiente:  { label:"Pendiente",           color:"#d97706", bg:"#fffbeb", text:"#92400e", dot:"#f59e0b" },
  en_curso:   { label:"En Curso",            color:"#0284c7", bg:"#f0f9ff", text:"#075985", dot:"#38bdf8" },
  finalizado: { label:"Finalizado",          color:"#16a34a", bg:"#f0fdf4", text:"#166534", dot:"#4ade80" },
};

// ── Helpers ──────────────────────────────────────────────────
function parseMoney(s) {
  if (s===null||s===undefined||s==="") return 0;
  return parseInt(String(s).replace(/\./g,"").replace(/[^\d]/g,""),10)||0;
}
function fmt(v) {
  return parseMoney(v).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0});
}
function today() { return new Date().toISOString().split("T")[0]; }
function addDays(dateStr, n) {
  const d = new Date((dateStr||today())+"T12:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().split("T")[0];
}
function addMonths(dateStr, n) {
  const d = new Date((dateStr||today())+"T12:00:00");
  d.setMonth(d.getMonth()+n);
  return d.toISOString().split("T")[0];
}
// Primera cuota = fecha+30d, luego cada mes
function cuotaFecha(baseDate, index) {
  const first = addDays(baseDate, 30);
  if (index===0) return first;
  return addMonths(first, index);
}

// ── API ──────────────────────────────────────────────────────
const api = {
  get: async (action) => {
    const r = await fetch(API_URL+"?action="+action);
    return r.json();
  },
  post: async (action, payload) => {
    const r = await fetch(API_URL, {
      method:"POST", headers:{"Content-Type":"text/plain"},
      body: JSON.stringify(Object.assign({action},payload)),
    });
    return r.json();
  },
};

// ── MoneyInput ───────────────────────────────────────────────
function MoneyInput({value, onChange, placeholder, style:ext}) {
  const [raw,setRaw]=useState(()=>{ const n=parseMoney(value); return n?String(n):""; });
  const [focused,setFocused]=useState(false);
  useEffect(()=>{ if(!focused){const n=parseMoney(value);setRaw(n?String(n):"");} },[value,focused]);
  function handleChange(e) {
    const d=e.target.value.replace(/[^\d]/g,"");
    setRaw(d);
    onChange(d===""?"":parseInt(d,10));
  }
  const display=raw?parseInt(raw,10).toLocaleString("es-AR",{maximumFractionDigits:0}):"";
  return h("input",{
    type:"text",inputMode:"numeric",value:display,placeholder:placeholder||"0",
    onChange:handleChange,
    onFocus:(e)=>{setFocused(true);setTimeout(()=>e.target.select(),0);},
    onBlur:()=>setFocused(false),
    style:Object.assign({fontVariantNumeric:"tabular-nums"},ext||{}),
  });
}

// ── Spinner ──────────────────────────────────────────────────
function Spinner({size,color}) {
  return h("div",{style:{width:size||20,height:size||20,border:"2px solid "+(color||T.accent)+"33",borderTop:"2px solid "+(color||T.accent),borderRadius:"50%",animation:"spin 0.7s linear infinite",display:"inline-block"}});
}

// ══════════════════════════════════════════════════════════════
//  CUOTAS MODAL
// ══════════════════════════════════════════════════════════════
function CuotasModal({trabajo, onSave, onClose}) {
  const montoBase = parseMoney(trabajo.monto);
  const [anticipo,setAnticipo] = useState(parseMoney(trabajo.anticipo));
  const [factAnticipo,setFactAnticipo] = useState(trabajo.facturaAnticipo||"");
  const [anticipoPagado,setAnticipoPagado] = useState(!!trabajo.anticipoPagado);

  const [cuotas,setCuotas] = useState(()=>{
    if (trabajo.cuotas&&trabajo.cuotas.length)
      return trabajo.cuotas.map(c=>Object.assign({},c,{monto:parseMoney(c.monto)}));
    const n=Math.max(1,parseInt(trabajo.cantCuotas)||1);
    const saldo=montoBase-parseMoney(trabajo.anticipo);
    return Array.from({length:n},(_,i)=>({
      id:i+1, fecha:cuotaFecha(trabajo.fecha||today(),i),
      indefinida:false, monto:Math.round(saldo/n), pagada:false,
      nroFactura:"",
    }));
  });

  function recalcular(nuevoAnticipo) {
    const saldo=montoBase-nuevoAnticipo;
    const n=cuotas.length;
    setCuotas(cuotas.map(c=>Object.assign({},c,{monto:n>0?Math.round(saldo/n):0})));
  }
  function handleAnticipo(val) {
    const v=val===""?0:parseMoney(val);
    setAnticipo(v); recalcular(v);
  }
  function addCuota() {
    const last=cuotas[cuotas.length-1];
    setCuotas([...cuotas,{
      id:Date.now(),pagada:false,indefinida:false,monto:0,nroFactura:"",
      fecha:last&&!last.indefinida?addMonths(last.fecha,1):cuotaFecha(today(),0),
    }]);
  }
  function removeCuota(id) { setCuotas(cuotas.filter(c=>c.id!==id)); }
  function upd(id,field,val) { setCuotas(cuotas.map(c=>c.id===id?Object.assign({},c,{[field]:val}):c)); }

  const total=cuotas.reduce((s,c)=>s+parseMoney(c.monto),0);
  const diff=total-(montoBase-anticipo);

  const inBase={background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"7px 10px",color:T.text,fontSize:13,outline:"none",width:"100%",fontFamily:"'DM Sans',sans-serif"};

  return h("div",{style:{position:"fixed",inset:0,background:"rgba(15,23,42,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(4px)",padding:"12px"}},
    h("div",{className:"modal-box",style:{background:T.surface,border:"1px solid "+T.border,borderRadius:16,padding:24,width:"min(620px,100%)",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}},

      // Header
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        h("div",null,
          h("h3",{style:{color:T.text,fontSize:17,fontWeight:700,margin:0,fontFamily:"'DM Serif Display',serif"}},"Gestión de Pagos"),
          h("p",{style:{color:T.textMid,fontSize:12,margin:"3px 0 0"}},trabajo.obra)
        ),
        h("button",{onClick:onClose,style:{background:"none",border:"none",color:T.textSoft,fontSize:22,cursor:"pointer"}},"✕")
      ),

      // ── Anticipo ──
      h("div",{style:{background:"#fffbeb",borderRadius:12,padding:"14px 16px",marginBottom:16,border:"1px solid #fde68a"}},
        h("p",{style:{color:"#92400e",fontSize:11,fontWeight:700,letterSpacing:"0.07em",margin:"0 0 10px"}},"ANTICIPO"),
        h("div",{style:{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}},
          h("div",{style:{flex:"1 1 110px"}},
            h("p",{style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 4px"}},"MONTO TOTAL"),
            h("p",{style:{color:T.text,fontWeight:700,fontSize:15,fontVariantNumeric:"tabular-nums",margin:0}},"$ "+fmt(montoBase))
          ),
          h("div",{style:{flex:"1 1 120px"}},
            h("p",{style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 4px"}},"ANTICIPO ($)"),
            h(MoneyInput,{value:anticipo,onChange:handleAnticipo,style:Object.assign({},inBase,{width:"100%",fontWeight:700,color:"#d97706"})})
          ),
          h("div",{style:{flex:"1 1 120px"}},
            h("p",{style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 4px"}},"SALDO"),
            h("p",{style:{color:T.accent,fontWeight:700,fontSize:15,fontVariantNumeric:"tabular-nums",margin:0}},"$ "+fmt(montoBase-anticipo))
          )
        ),
        h("div",{style:{display:"flex",gap:10,marginTop:10,flexWrap:"wrap",alignItems:"center"}},
          h("div",{style:{flex:"1 1 160px"}},
            h("p",{style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 4px"}},"Nº FACTURA ANTICIPO"),
            h("input",{type:"text",value:factAnticipo,onChange:e=>setFactAnticipo(e.target.value),placeholder:"Nº factura (opcional)",style:Object.assign({},inBase,{width:"100%"})})
          ),
          h("label",{style:{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:T.textMid,paddingTop:18}},
            h("input",{type:"checkbox",checked:anticipoPagado,onChange:e=>setAnticipoPagado(e.target.checked),style:{accentColor:T.accent,width:16,height:16,cursor:"pointer"}}),
            "Anticipo cobrado"
          )
        ),
        h("p",{style:{color:T.textSoft,fontSize:11,margin:"10px 0 0"}},"💡 Modificar el anticipo recalcula todas las cuotas automáticamente.")
      ),

      // ── Cuotas header ──
      h("p",{style:{color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.07em",margin:"0 0 8px"}},"CUOTAS"),
      h("div",{className:"modal-grid",style:{display:"grid",gridTemplateColumns:"20px 1fr 110px 110px 72px 26px",gap:5,paddingBottom:6,borderBottom:"1px solid "+T.border,marginBottom:8}},
        ["#","Fecha","Monto ($)","Nº Factura","",""].map((hdr,i)=>h("span",{key:i,style:{color:T.textSoft,fontSize:10,fontWeight:700,letterSpacing:"0.06em"}},hdr))
      ),

      // ── Cuota rows ──
      cuotas.map((c,i)=>
        h("div",{key:c.id,className:"modal-grid",style:{display:"grid",gridTemplateColumns:"20px 1fr 110px 110px 72px 26px",gap:5,alignItems:"center",marginBottom:7}},
          h("span",{style:{color:T.textSoft,fontSize:12,textAlign:"right"}},i+1),

          // Fecha / Indefinida
          h("div",{style:{display:"flex",gap:4,alignItems:"center"}},
            c.indefinida
              ? h("span",{style:{flex:1,padding:"7px 8px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,fontSize:12,color:T.textMid}},"Indefinida")
              : h("input",{type:"date",value:c.fecha,onChange:e=>upd(c.id,"fecha",e.target.value),
                  style:{flex:1,background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"7px 8px",color:T.text,fontSize:12,outline:"none"}}),
            h("label",{style:{display:"flex",alignItems:"center",gap:2,cursor:"pointer",fontSize:10,color:T.textSoft,whiteSpace:"nowrap"}},
              h("input",{type:"checkbox",checked:!!c.indefinida,onChange:e=>upd(c.id,"indefinida",e.target.checked),style:{accentColor:T.accent,cursor:"pointer"}}),
              "∞"
            )
          ),

          h(MoneyInput,{value:c.monto,onChange:v=>upd(c.id,"monto",v===""?0:v),style:Object.assign({},inBase,{fontSize:12})}),

          // Nro factura cuota
          h("input",{type:"text",value:c.nroFactura||"",onChange:e=>upd(c.id,"nroFactura",e.target.value),
            placeholder:"Nº factura",style:Object.assign({},inBase,{fontSize:12})}),

          // Pagada toggle
          h("button",{onClick:()=>upd(c.id,"pagada",!c.pagada),style:{padding:"6px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,background:c.pagada?"#dcfce7":"#fef9ec",color:c.pagada?"#15803d":"#b45309",whiteSpace:"nowrap"}},
            c.pagada?"✓ PAG":"PEND"
          ),
          h("button",{onClick:()=>removeCuota(c.id),style:{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18,padding:0,textAlign:"center",lineHeight:1}},"×")
        )
      ),

      h("button",{onClick:addCuota,style:{width:"100%",padding:"8px",background:"transparent",border:"1px dashed "+T.borderMid,borderRadius:8,color:T.textMid,cursor:"pointer",marginTop:4,fontSize:13}},
        "+ Agregar cuota"
      ),

      // Footer
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:16,paddingTop:16,borderTop:"1px solid "+T.border,flexWrap:"wrap",gap:10}},
        h("span",{style:{fontSize:13,fontWeight:600,color:Math.abs(diff)<2?"#16a34a":diff>0?"#dc2626":"#d97706"}},
          "Total cuotas: $ "+fmt(total)+(Math.abs(diff)<2?" ✓":diff>0?" (excede $"+fmt(diff)+")":" (faltan $"+fmt(-diff)+")")
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("button",{onClick:onClose,style:{padding:"8px 16px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,cursor:"pointer",fontSize:13}},"Cancelar"),
          h("button",{onClick:()=>onSave(cuotas,anticipo,factAnticipo,anticipoPagado),style:{padding:"8px 18px",background:T.accent,border:"none",borderRadius:8,color:"white",cursor:"pointer",fontSize:13,fontWeight:600}},"Guardar")
        )
      )
    )
  );
}

// ══════════════════════════════════════════════════════════════
//  TRABAJO CARD
// ══════════════════════════════════════════════════════════════
function TrabajoCard({t, onDelete, onStatusChange, onCuotasModal, onFactura, saving}) {
  const [open,setOpen]=useState(false);
  const [editFac,setEditFac]=useState(false);
  const [facVal,setFacVal]=useState("");

  const st=STATUS[t.estado]||STATUS.pendiente;
  const monto    = parseMoney(t.monto);
  const anticipo = parseMoney(t.anticipo);
  const saldo    = monto - anticipo;
  const cuotasPag= (t.cuotas||[]).filter(c=>c.pagada).length;
  const cuotasTot= (t.cuotas||[]).length;
  // Cobrado = anticipo (si pagado) + cuotas cobradas
  const cobrado  = (t.anticipoPagado?anticipo:0) + (t.cuotas||[]).filter(c=>c.pagada).reduce((s,c)=>s+parseMoney(c.monto),0);
  const pendiente= monto - cobrado;

  return h("div",{style:{background:T.surface,border:"1px solid "+T.border,borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",opacity:saving?0.65:1,transition:"opacity 0.2s"}},

    // ── Header colapsable ──
    h("div",{onClick:()=>setOpen(o=>!o),style:{display:"flex",alignItems:"stretch",cursor:"pointer",userSelect:"none"}},
      h("div",{style:{width:6,background:st.dot,borderRadius:"14px 0 0 14px",flexShrink:0}}),
      h("div",{style:{flex:1,display:"flex",alignItems:"center",gap:10,padding:"12px 14px",minWidth:0}},
        h("div",{style:{width:34,height:34,borderRadius:9,background:st.bg,border:"1.5px solid "+st.color+"55",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          h("div",{style:{width:13,height:13,borderRadius:"50%",background:st.dot,boxShadow:"0 0 5px "+st.dot+"88"}})
        ),
        h("div",{style:{flex:1,minWidth:0}},
          h("div",{className:"card-header-row",style:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}},
            h("span",{style:{fontWeight:700,color:T.text,fontSize:14,fontFamily:"'DM Serif Display',serif",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}},t.obra),
            h("span",{style:{padding:"1px 7px",borderRadius:20,background:st.bg,color:st.text,fontSize:10,fontWeight:700,border:"1px solid "+st.color+"44",whiteSpace:"nowrap"}},st.label),
            t.facturado&&h("span",{style:{padding:"1px 7px",borderRadius:20,background:"#f0fdf4",color:"#166534",fontSize:10,fontWeight:700,border:"1px solid #bbf7d0",whiteSpace:"nowrap"}},"🧾 #"+t.nroFactura)
          ),
          h("p",{style:{margin:"2px 0 0",color:T.textSoft,fontSize:11}},
            t.fecha+(t.descripcion?" · "+t.descripcion.slice(0,50)+(t.descripcion.length>50?"…":""):"")
          ),
          // Mobile: show quick amounts inline
          h("div",{className:"card-money-quick-mobile"},
            h("span",{style:{fontSize:12,color:T.text,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(monto)),
            h("span",{style:{fontSize:12,color:pendiente>0?"#dc2626":"#16a34a",fontWeight:700,fontVariantNumeric:"tabular-nums"}},"Pend: $ "+fmt(pendiente))
          )
        ),
        // Desktop quick amounts
        h("div",{className:"card-money-quick",style:{display:"flex",gap:14,flexShrink:0,marginRight:4}},
          h("div",{style:{textAlign:"right"}},
            h("p",{style:{margin:0,color:T.textSoft,fontSize:10,fontWeight:600}},"TOTAL"),
            h("p",{style:{margin:0,color:T.text,fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(monto))
          ),
          h("div",{style:{textAlign:"right"}},
            h("p",{style:{margin:0,color:T.textSoft,fontSize:10,fontWeight:600}},"COBRADO"),
            h("p",{style:{margin:0,color:"#16a34a",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(cobrado))
          ),
          h("div",{style:{textAlign:"right"}},
            h("p",{style:{margin:0,color:T.textSoft,fontSize:10,fontWeight:600}},"PENDIENTE"),
            h("p",{style:{margin:0,color:pendiente>0?"#dc2626":"#16a34a",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(pendiente))
          ),
          cuotasTot>0&&h("div",{style:{textAlign:"right"}},
            h("p",{style:{margin:0,color:T.textSoft,fontSize:10,fontWeight:600}},"CUOTAS"),
            h("p",{style:{margin:0,color:T.textMid,fontSize:13,fontWeight:700}},cuotasPag+"/"+cuotasTot)
          )
        ),
        h("span",{style:{color:T.textSoft,fontSize:11,transition:"transform 0.25s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0}},"▼")
      )
    ),

    // ── Detalle expandido ──
    open&&h("div",{style:{borderTop:"1px solid "+T.border,padding:"14px 16px 16px",animation:"slideIn 0.2s ease-out"}},

      // Financiero grid
      h("div",{className:"fin-grid",style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}},
        [["Total",fmt(monto),T.text],["Anticipo",fmt(anticipo)+(t.anticipoPagado?" ✓":""),"#d97706"],["Saldo",fmt(saldo),T.accent],["Cobrado",fmt(cobrado)+(t.anticipoPagado?" (inc. ant.)":""),"#16a34a"],["Pendiente",fmt(pendiente),pendiente>0?"#dc2626":"#16a34a"]].map(([l,v,c])=>
          h("div",{key:l,style:{background:T.surfaceAlt,borderRadius:8,padding:"8px 10px",border:"1px solid "+T.border}},
            h("p",{style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:700,letterSpacing:"0.06em"}},l.toUpperCase()),
            h("p",{style:{margin:"2px 0 0",color:c,fontSize:12,fontWeight:700,fontVariantNumeric:"tabular-nums"}},v.length>12?v:("$ "+v))
          )
        ),
        cuotasTot>0&&h("div",{style:{background:T.surfaceAlt,borderRadius:8,padding:"8px 10px",border:"1px solid "+T.border}},
          h("p",{style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:700,letterSpacing:"0.06em"}},"CUOTAS"),
          h("p",{style:{margin:"2px 0 0",color:T.textMid,fontSize:12,fontWeight:700}},cuotasPag+"/"+cuotasTot)
        )
      ),

      // Anticipo info
      anticipo>0&&h("div",{style:{background:"#fffbeb",borderRadius:8,padding:"8px 12px",marginBottom:10,border:"1px solid #fde68a",fontSize:12,display:"flex",gap:16,flexWrap:"wrap"}},
        h("span",{style:{color:"#92400e"}},"Anticipo: $ "+fmt(anticipo)+" "+(t.anticipoPagado?"✅ Cobrado":"⏳ Pendiente")),
        t.facturaAnticipo&&h("span",{style:{color:"#b45309"}},"🧾 Factura: "+t.facturaAnticipo)
      ),

      // Detalle cuotas
      cuotasTot>0&&h("div",{style:{background:T.surfaceAlt,borderRadius:10,padding:"10px 12px",marginBottom:12,border:"1px solid "+T.border}},
        h("p",{style:{margin:"0 0 8px",color:T.textMid,fontSize:10,fontWeight:700,letterSpacing:"0.06em"}},"DETALLE DE CUOTAS"),
        (t.cuotas||[]).map((c,i)=>
          h("div",{key:c.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<cuotasTot-1?"1px dashed "+T.border:"none",flexWrap:"wrap",gap:6}},
            h("span",{style:{color:T.textMid,fontSize:12}},"Cuota "+(i+1)+" · "+(c.indefinida?"Indefinida":c.fecha)+(c.nroFactura?" · 🧾 "+c.nroFactura:"")),
            h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
              h("span",{style:{color:T.text,fontWeight:600,fontSize:12,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(c.monto)),
              h("span",{style:{padding:"1px 8px",borderRadius:10,fontSize:10,fontWeight:700,background:c.pagada?"#dcfce7":"#fef9ec",color:c.pagada?"#15803d":"#b45309"}},c.pagada?"✓ PAGADA":"PENDIENTE")
            )
          )
        )
      ),

      // Acciones
      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
        h("select",{value:t.estado,onChange:e=>onStatusChange(t.id,e.target.value),
          style:{padding:"7px 10px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,fontSize:12,cursor:"pointer",outline:"none",fontFamily:"'DM Sans',sans-serif"}},
          Object.entries(STATUS).map(([k,v])=>h("option",{key:k,value:k},v.label))
        ),
        h("button",{onClick:()=>onCuotasModal(t),style:{padding:"7px 14px",background:T.accentBg,border:"1px solid #bfdbfe",borderRadius:8,color:T.accent,fontSize:12,cursor:"pointer",fontWeight:600}},
          "💰 Gestionar pagos"
        ),
        editFac
          ?h("div",{style:{display:"flex",gap:6}},
              h("input",{value:facVal,onChange:e=>setFacVal(e.target.value),placeholder:"Nº factura",
                style:{padding:"6px 10px",background:T.surfaceAlt,border:"1px solid "+T.accent,borderRadius:8,color:T.text,fontSize:12,width:120,outline:"none",fontFamily:"'DM Sans',sans-serif"}}),
              h("button",{onClick:()=>{onFactura(t.id,facVal);setEditFac(false);setFacVal("");},style:{padding:"6px 12px",background:"#10b981",border:"none",borderRadius:8,color:"white",fontSize:12,cursor:"pointer"}},"✓"),
              h("button",{onClick:()=>setEditFac(false),style:{padding:"6px 12px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,fontSize:12,cursor:"pointer"}},"✕")
            )
          :h("button",{onClick:()=>{setEditFac(true);setFacVal(t.nroFactura||"");},
              style:{padding:"7px 14px",background:t.facturado?"#f0fdf4":T.surfaceAlt,border:"1px solid "+(t.facturado?"#bbf7d0":T.border),borderRadius:8,color:t.facturado?"#16a34a":T.textMid,fontSize:12,cursor:"pointer",fontWeight:t.facturado?600:400}},
              "🧾 "+(t.facturado?"Factura #"+t.nroFactura:"Registrar factura")
            ),
        h("button",{onClick:()=>onDelete(t.id),style:{marginLeft:"auto",padding:"7px 12px",background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,color:"#dc2626",fontSize:12,cursor:"pointer"}},
          "🗑 Eliminar"
        )
      )
    )
  );
}

//  LOGIN
// ══════════════════════════════════════════════════════════════
function Login({onLogin}) {
  const [user,setUser]=useState(""); const [pass,setPass]=useState("");
  const [err,setErr]=useState(""); const [anim,setAnim]=useState("fadeUp 0.5s ease-out");
  function handleSubmit() {
    if (user.trim()===CRED_USER&&pass.trim()===CRED_PASS) onLogin();
    else { setErr("Usuario o contraseña incorrectos"); setAnim("shake 0.4s"); setTimeout(()=>setAnim("none"),500); }
  }
  const iS={width:"100%",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:10,padding:"12px 16px",color:T.text,fontSize:15,outline:"none",fontFamily:"'DM Sans',sans-serif"};
  return h("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
    h("div",{style:{animation:anim,width:"min(400px,100%)",background:T.surface,border:"1px solid "+T.border,borderRadius:20,padding:"36px 32px",boxShadow:"0 8px 40px rgba(0,0,0,0.10)"}},
      h("div",{style:{textAlign:"center",marginBottom:32}},
        h("div",{style:{width:54,height:54,background:"linear-gradient(135deg,#2563eb,#4f46e5)",borderRadius:15,margin:"0 auto 14px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,boxShadow:"0 6px 20px rgba(37,99,235,0.3)"}},"🏗️"),
        h("h1",{style:{color:T.text,fontSize:24,fontWeight:400,margin:0,fontFamily:"'DM Serif Display',serif"}},"GestiónObra"),
        h("p",{style:{color:T.textMid,fontSize:13,margin:"5px 0 0"}},"Sistema de gestión de trabajos y pagos")
      ),
      h("div",{style:{marginBottom:14}},
        h("label",{style:{display:"block",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.08em",marginBottom:7}},"USUARIO"),
        h("input",{type:"text",value:user,placeholder:"Usuario",onChange:e=>setUser(e.target.value),onKeyDown:e=>e.key==="Enter"&&handleSubmit(),style:iS,
          onFocus:e=>e.target.style.borderColor="#2563eb",onBlur:e=>e.target.style.borderColor=T.border})
      ),
      h("div",{style:{marginBottom:22}},
        h("label",{style:{display:"block",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.08em",marginBottom:7}},"CONTRASEÑA"),
        h("input",{type:"password",value:pass,placeholder:"••••••••",onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==="Enter"&&handleSubmit(),style:iS,
          onFocus:e=>e.target.style.borderColor="#2563eb",onBlur:e=>e.target.style.borderColor=T.border})
      ),
      err&&h("p",{style:{color:"#ef4444",fontSize:13,textAlign:"center",marginBottom:14,background:"#fef2f2",padding:"8px 12px",borderRadius:8}},err),
      h("button",{onClick:handleSubmit,style:{width:"100%",padding:"13px",background:"linear-gradient(135deg,#2563eb,#4f46e5)",border:"none",borderRadius:10,color:"white",fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 4px 16px rgba(37,99,235,0.3)",fontFamily:"'DM Sans',sans-serif"}},
        "Ingresar →"
      )
    )
  );
}

// ══════════════════════════════════════════════════════════════
//  APP PRINCIPAL
// ══════════════════════════════════════════════════════════════
function App() {
  const [loggedIn,setLoggedIn]=useState(false);
  const [trabajos,setTrabajos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [savingId,setSavingId]=useState(null);
  const [saving,setSaving]=useState(false);
  const [activeTab,setActiveTab]=useState("trabajos");
  const [cuotasModal,setCuotasModal]=useState(null);
  const [apiError,setApiError]=useState("");
  const [busqueda,setBusqueda]=useState("");
  const [showForm,setShowForm]=useState(false); // mobile toggle

  const emptyForm={fecha:today(),obra:"",descripcion:"",estado:"pendiente",monto:"",anticipo:"",cantCuotas:"1"};
  const [form,setForm]=useState(emptyForm);
  const [saved,setSaved]=useState(false);

  const loadTrabajos=useCallback(async()=>{
    setLoading(true); setApiError("");
    try {
      const res=await api.get("getAll");
      if (res.error) { setApiError("Error API: "+res.error); setTrabajos([]); }
      else setTrabajos(res.trabajos||[]);
    } catch(e) { setApiError("No se pudo conectar con la API."); }
    setLoading(false);
  },[]);

  useEffect(()=>{ if(loggedIn) loadTrabajos(); },[loggedIn]);

  function setField(k,v) { setForm(f=>Object.assign({},f,{[k]:v})); }

  function calcCuotas(monto,anticipo,cant,fechaBase) {
    const s=parseMoney(monto)-parseMoney(anticipo);
    const n=Math.max(1,parseInt(cant)||1);
    return Array.from({length:n},(_,i)=>({
      id:i+1, fecha:cuotaFecha(fechaBase||today(),i),
      indefinida:false, monto:Math.round(s/n), pagada:false, nroFactura:"",
    }));
  }

  async function handleAdd() {
    if (!form.obra.trim()) return;
    setSaving(true);
    const nuevo=Object.assign({},form,{
      id:String(Date.now()), monto:parseMoney(form.monto), anticipo:parseMoney(form.anticipo),
      cantCuotas:parseInt(form.cantCuotas)||1, facturado:false, nroFactura:"",
      anticipoPagado:false, facturaAnticipo:"",
      cuotas:calcCuotas(form.monto,form.anticipo,form.cantCuotas,form.fecha),
    });
    try {
      const res=await api.post("save",{data:nuevo});
      if (res.ok) {
        setTrabajos(prev=>[nuevo,...prev]);
        setForm(emptyForm); setSaved(true); setTimeout(()=>setSaved(false),2000);
        setShowForm(false);
      } else setApiError("Error al guardar: "+res.error);
    } catch(e) { setApiError("Error de conexión al guardar."); }
    setSaving(false);
  }

  async function updateRemote(upd) {
    setSavingId(upd.id);
    try { const res=await api.post("update",{data:upd}); if(!res.ok) setApiError("Error al actualizar."); }
    catch(e) { setApiError("Error de conexión."); }
    setSavingId(null);
  }

  async function handleDelete(id) {
    if (!confirm("¿Eliminar este trabajo?")) return;
    setSavingId(id);
    try {
      const res=await api.post("delete",{id});
      if (res.ok) setTrabajos(t=>t.filter(x=>x.id!==id));
      else setApiError("Error al eliminar.");
    } catch(e) { setApiError("Error de conexión."); }
    setSavingId(null);
  }

  async function handleStatusChange(id,estado) {
    const updated=trabajos.map(t=>t.id===id?Object.assign({},t,{estado}):t);
    setTrabajos(updated);
    await updateRemote(updated.find(t=>t.id===id));
  }

  async function handleSaveCuotas(id,cuotas,anticipo,facturaAnticipo,anticipoPagado) {
    const updated=trabajos.map(t=>t.id===id?Object.assign({},t,{cuotas,anticipo,facturaAnticipo,anticipoPagado}):t);
    setTrabajos(updated);
    await updateRemote(updated.find(t=>t.id===id));
    setCuotasModal(null);
  }

  async function handleFactura(id,nro) {
    const updated=trabajos.map(t=>t.id===id?Object.assign({},t,{facturado:true,nroFactura:nro}):t);
    setTrabajos(updated);
    await updateRemote(updated.find(t=>t.id===id));
  }

  // Ordenar por fecha más cercana primero, filtrar por búsqueda
  const trabajosFiltrados=useMemo(()=>{
    let list=[...trabajos];
    // Orden por fecha ascendente (más cercana primero)
    list.sort((a,b)=>{
      const da=a.fecha||"9999"; const db=b.fecha||"9999";
      return da.localeCompare(db);
    });
    // Búsqueda
    if (busqueda.trim()) {
      const q=busqueda.trim().toLowerCase();
      list=list.filter(t=>(t.obra||"").toLowerCase().includes(q)||(t.descripcion||"").toLowerCase().includes(q));
    }
    return list;
  },[trabajos,busqueda]);

  const alertas=useMemo(()=>trabajos.flatMap(t=>{
    const arr=[];
    (t.cuotas||[]).forEach(c=>{
      if(!c.pagada&&!c.indefinida){
        const diff=Math.ceil((new Date(c.fecha)-new Date())/86400000);
        if(diff<=30) arr.push({tipo:"pago",trabajo:t.obra,fecha:c.fecha,monto:c.monto,diff,id:t.id+"-"+c.id});
      }
    });
    if(!t.facturado&&t.estado==="finalizado") arr.push({tipo:"factura",trabajo:t.obra,diff:999,id:"fac-"+t.id});
    return arr;
  }).sort((a,b)=>a.diff-b.diff),[trabajos]);

  const iS={width:"100%",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:10,padding:"10px 14px",color:T.text,fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif"};
  const lS={display:"block",color:T.textMid,fontSize:11,fontWeight:700,letterSpacing:"0.07em",marginBottom:6};

  if (!loggedIn) return h(Login,{onLogin:()=>setLoggedIn(true)});

  return h("div",{style:{minHeight:"100vh",background:T.bg,fontFamily:"'DM Sans',sans-serif"}},

    // ── Header ──
    h("div",{style:{background:T.surface,borderBottom:"1px solid "+T.border,padding:"0 14px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("span",{style:{fontSize:18}},"🏗️"),
        h("span",{style:{fontFamily:"'DM Serif Display',serif",fontSize:17,color:T.text}},"GestiónObra")
      ),
      h("div",{style:{display:"flex",gap:3}},
        [["trabajos","📋"],["alertas","🔔"]].map(([k,icon])=>
          h("button",{key:k,onClick:()=>setActiveTab(k),title:k,style:{padding:"5px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,background:activeTab===k?T.accentBg:"transparent",color:activeTab===k?T.accent:T.textMid,position:"relative"}},
            icon,
            k==="alertas"&&alertas.length>0&&h("span",{style:{position:"absolute",top:3,right:5,width:7,height:7,background:"#ef4444",borderRadius:"50%",animation:"pulse 2s infinite"}})
          )
        ),
        h("button",{onClick:loadTrabajos,title:"Recargar",style:{padding:"5px 9px",borderRadius:8,border:"1px solid "+T.border,background:"none",cursor:"pointer",fontSize:12,color:T.textMid}},"↺")
      ),
      h("button",{onClick:()=>setLoggedIn(false),style:{background:"none",border:"1px solid "+T.border,borderRadius:8,padding:"4px 9px",color:T.textMid,cursor:"pointer",fontSize:11}},"Salir")
    ),

    apiError&&h("div",{style:{background:"#fef2f2",borderBottom:"1px solid #fecaca",padding:"7px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("span",{style:{color:"#dc2626",fontSize:12}},"⚠️ "+apiError),
      h("button",{onClick:()=>setApiError(""),style:{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16}},"✕")
    ),

    // ── Alertas tab ──
    activeTab==="alertas"
      ?h("div",{style:{padding:16,maxWidth:800,margin:"0 auto"}},
          h("h2",{style:{fontFamily:"'DM Serif Display',serif",fontSize:20,margin:"0 0 14px",color:T.text}},"Centro de Alertas"),
          alertas.length===0
            ?h("div",{style:{textAlign:"center",padding:48,color:T.textSoft,background:T.surface,borderRadius:16,border:"1px solid "+T.border}},
                h("div",{style:{fontSize:34,marginBottom:10}},"✅"),
                h("p",{style:{margin:0}},"Sin alertas pendientes")
              )
            :alertas.map(a=>h("div",{key:a.id,style:{background:T.surface,border:"1px solid "+(a.tipo==="factura"?"#fde68a":a.diff<=7?"#fecaca":"#bfdbfe"),borderRadius:12,padding:"13px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}},
              h("div",{style:{width:36,height:36,borderRadius:10,background:a.tipo==="factura"?"#fef9c3":a.diff<=7?"#fef2f2":"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}},
                a.tipo==="factura"?"🧾":a.diff<=0?"🚨":a.diff<=7?"⚠️":"📅"
              ),
              h("div",{style:{flex:1,minWidth:0}},
                h("p",{style:{margin:0,fontWeight:600,color:T.text,fontSize:13}},a.trabajo),
                a.tipo==="pago"
                  ?h("p",{style:{margin:"2px 0 0",color:T.textMid,fontSize:12}},"$ "+fmt(a.monto)+" · "+(a.diff<=0?"VENCIDA hace "+Math.abs(a.diff)+" días":"Vence en "+a.diff+" día"+(a.diff!==1?"s":"")+" ("+a.fecha+")"))
                  :h("p",{style:{margin:"2px 0 0",color:"#d97706",fontSize:12}},"Trabajo finalizado sin facturar")
              )
