<!DOCTYPE html>
<html lang="es">
<head>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#1e293b}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb!important}
select option{background:#fff;color:#1e293b}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer}
::-webkit-scrollbar{width:5px}

::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}
.lpanel{width:276px;min-width:276px;background:#fff;border-right:1px solid #e2e8f0;padding:14px 14px 70px;overflow-y:auto;flex-shrink:0}

  .layout{flex-direction:column;height:auto;overflow:visible}
  .lpanel{width:100%;min-width:0;border-right:none;border-bottom:1px solid #e2e8f0}
  .rpanel{padding:10px 10px 70px}
  .qmoney{display:none}
  .qmobile{display:flex}
  .fgrid{grid-template-columns:repeat(3,1fr)!important}
  .mgrid{grid-template-columns:18px 1fr 90px 80px 60px 22px!important}
  .mbox{padding:14px!important;width:calc(100vw - 12px)!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
(function() {
"use strict";

var API_URL   = "https://script.google.com/macros/s/AKfycbxICW4cXDPleIQeGyaTx8O5A9_N0rxZpXT7DG4-Wz0qcBi9PU-4gY9i0Eu5vxt15m9yoA/exec";
var CRED_USER = "ivandimiero";
var CRED_PASS = "Salta1954";

var useState    = React.useState;
var useEffect   = React.useEffect;
var useCallback = React.useCallback;
var useMemo     = React.useMemo;
var h           = React.createElement;

var T = {
  bg:"#f1f5f9", surface:"#fff", surfaceAlt:"#f8fafc",
  border:"#e2e8f0", borderMid:"#cbd5e1",
  text:"#1e293b", textMid:"#475569", textSoft:"#94a3b8",
  accent:"#2563eb", accentBg:"#eff6ff"
};

var STATUS = {
  urgente:   {label:"A Iniciar - Urgente", color:"#dc2626", bg:"#fef2f2", text:"#991b1b", dot:"#ef4444"},
  pendiente: {label:"Pendiente",           color:"#d97706", bg:"#fffbeb", text:"#92400e", dot:"#f59e0b"},
  en_curso:  {label:"En Curso",            color:"#0284c7", bg:"#f0f9ff", text:"#075985", dot:"#38bdf8"},
  finalizado:{label:"Finalizado",          color:"#16a34a", bg:"#f0fdf4", text:"#166534", dot:"#4ade80"}
};

/* ─ helpers ─────────────────────────────────────────── */
function parseMoney(s) {
  if (s === null || s === undefined || s === "") return 0;
  return parseInt(String(s).replace(/\./g,"").replace(/[^\d]/g,""), 10) || 0;
}
function fmt(v) {
  return parseMoney(v).toLocaleString("es-AR", {minimumFractionDigits:0, maximumFractionDigits:0});
}
function todayStr() { return new Date().toISOString().split("T")[0]; }
function fmtFecha(ds) {
  if (!ds || ds.length < 10) return ds || "";
  var p = ds.substring(0, 10).split("-");
  return p[2] + "/" + p[1] + "/" + p[0];
}
function addDays(ds, n) {
  var d = new Date((ds || todayStr()) + "T12:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}
function addMonths(ds, n) {
  var d = new Date((ds || todayStr()) + "T12:00:00");
  d.setMonth(d.getMonth() + n);
  return d.toISOString().split("T")[0];
}
function cuotaDate(base, i) {
  var first = addDays(base, 30);
  return i === 0 ? first : addMonths(first, i);
}
function merge(a, b) { return Object.assign({}, a, b); }
function setKey(obj, key, val) {
  var r = Object.assign({}, obj);
  r[key] = val;
  return r;
}

/* ─ API ──────────────────────────────────────────────── */
var api = {
  get: function(action) {
    return fetch(API_URL + "?action=" + action).then(function(r){ return r.json(); });
  },
  post: function(action, payload) {
    var body = Object.assign({action: action}, payload);
    return fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain"},
      body: JSON.stringify(body)
    }).then(function(r){ return r.json(); });
  }
};

/* ─ MoneyInput ───────────────────────────────────────── */
function MoneyInput(props) {
  var value       = props.value;
  var onChange    = props.onChange;
  var placeholder = props.placeholder;
  var extStyle    = props.style || {};

  var rawState    = useState(function(){ var n=parseMoney(value); return n ? String(n) : ""; });
  var raw         = rawState[0];
  var setRaw      = rawState[1];
  var focState    = useState(false);
  var focused     = focState[0];
  var setFocused  = focState[1];

  useEffect(function() {
    if (!focused) { var n = parseMoney(value); setRaw(n ? String(n) : ""); }
  }, [value, focused]);

  function handleChange(e) {
    var digits = e.target.value.replace(/[^\d]/g, "");
    setRaw(digits);
    onChange(digits === "" ? "" : parseInt(digits, 10));
  }
  var display = raw ? parseInt(raw, 10).toLocaleString("es-AR", {maximumFractionDigits:0}) : "";
  return h("input", {
    type:"text", inputMode:"numeric", value:display, placeholder:placeholder||"0",
    onChange: handleChange,
    onFocus: function(e){ setFocused(true); setTimeout(function(){ e.target.select(); }, 0); },
    onBlur:  function(){ setFocused(false); },
    style: merge({fontVariantNumeric:"tabular-nums"}, extStyle)
  });
}

/* ─ Spinner ──────────────────────────────────────────── */
function Spinner(props) {
  var sz = props.size || 20;
  var cl = props.color || T.accent;
  return h("div", {style:{
    width:sz, height:sz,
    border:"2px solid " + cl + "33",
    borderTop:"2px solid " + cl,
    borderRadius:"50%",
    animation:"spin .7s linear infinite",
    display:"inline-block"
  }});
}

/* ─ CuotasModal ──────────────────────────────────────── */
function CuotasModal(props) {
  var trabajo  = props.trabajo;
  var onSave   = props.onSave;
  var onClose  = props.onClose;

  var montoBase = parseMoney(trabajo.monto);

  var antState = useState(parseMoney(trabajo.anticipo));
  var anticipo = antState[0]; var setAnticipo = antState[1];

  var faState  = useState(trabajo.facturaAnticipo || "");
  var factAnt  = faState[0]; var setFactAnt  = faState[1];

  var apState  = useState(!!trabajo.anticipoPagado);
  var antPag   = apState[0]; var setAntPag   = apState[1];

  var cState   = useState(function() {
    if (trabajo.cuotas && trabajo.cuotas.length) {
      return trabajo.cuotas.map(function(c){ return merge(c, {monto: parseMoney(c.monto)}); });
    }
    var n = Math.max(1, parseInt(trabajo.cantCuotas) || 1);
    var saldo = montoBase - parseMoney(trabajo.anticipo);
    return Array.from({length: n}, function(_, i) {
      return {id:i+1, fecha:cuotaDate(trabajo.fecha||todayStr(),i), indefinida:false, monto:Math.round(saldo/n), pagada:false, nroFactura:""};
    });
  });
  var cuotas = cState[0]; var setCuotas = cState[1];

  function recalc(ant) {
    var saldo = montoBase - ant;
    var n = cuotas.length;
    setCuotas(cuotas.map(function(c){ return merge(c, {monto: n > 0 ? Math.round(saldo/n) : 0}); }));
  }
  function handleAnt(val) { var v = val===""?0:parseMoney(val); setAnticipo(v); recalc(v); }
  function addCuota() {
    var last = cuotas[cuotas.length-1];
    var newFecha = (last && !last.indefinida) ? addMonths(last.fecha, 1) : cuotaDate(todayStr(), 0);
    setCuotas(cuotas.concat([{id:Date.now(), pagada:false, indefinida:false, monto:0, nroFactura:"", fecha:newFecha}]));
  }
  function remCuota(id) { setCuotas(cuotas.filter(function(c){ return c.id !== id; })); }
  function updCuota(id, field, val) {
    setCuotas(cuotas.map(function(c){ return c.id===id ? setKey(c, field, val) : c; }));
  }

  var total = cuotas.reduce(function(s,c){ return s + parseMoney(c.monto); }, 0);
  var diff  = total - (montoBase - anticipo);

  var ib = {background:T.surfaceAlt, border:"1px solid "+T.border, borderRadius:8, padding:"7px 8px", color:T.text, fontSize:12, outline:"none", width:"100%", fontFamily:"inherit"};

  return h("div", {style:{position:"fixed",inset:0,background:"rgba(15,23,42,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(4px)",padding:10}},
    h("div", {className:"mbox", style:{background:T.surface,border:"1px solid "+T.border,borderRadius:16,padding:22,width:"min(620px,100%)",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.18)"}},

      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h("div", null,
          h("h3", {style:{color:T.text,fontSize:16,fontWeight:700,margin:0,fontFamily:"'DM Serif Display',serif"}}, "Gestion de Pagos"),
          h("p",  {style:{color:T.textMid,fontSize:12,margin:"3px 0 0"}}, trabajo.obra)
        ),
        h("button", {onClick:onClose, style:{background:"none",border:"none",color:T.textSoft,fontSize:22,cursor:"pointer",lineHeight:1}}, "x")
      ),

      /* anticipo block */
      h("div", {style:{background:"#fffbeb",borderRadius:10,padding:"12px 14px",marginBottom:14,border:"1px solid #fde68a"}},
        h("p", {style:{color:"#92400e",fontSize:10,fontWeight:700,letterSpacing:".07em",margin:"0 0 10px"}}, "ANTICIPO"),
        h("div", {style:{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}},
          h("div", {style:{flex:"1 1 100px"}},
            h("p", {style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 3px"}}, "MONTO TOTAL"),
            h("p", {style:{color:T.text,fontWeight:700,fontSize:14,fontVariantNumeric:"tabular-nums",margin:0}}, "$ " + fmt(montoBase))
          ),
          h("div", {style:{flex:"1 1 110px"}},
            h("p", {style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 3px"}}, "ANTICIPO ($)"),
            h(MoneyInput, {value:anticipo, onChange:handleAnt, style:merge(ib,{fontWeight:700,color:"#d97706"})})
          ),
          h("div", {style:{flex:"1 1 100px"}},
            h("p", {style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 3px"}}, "SALDO"),
            h("p", {style:{color:T.accent,fontWeight:700,fontSize:14,fontVariantNumeric:"tabular-nums",margin:0}}, "$ " + fmt(montoBase - anticipo))
          )
        ),
        h("div", {style:{display:"flex",gap:10,marginTop:10,flexWrap:"wrap",alignItems:"center"}},
          h("div", {style:{flex:"1 1 150px"}},
            h("p", {style:{color:T.textSoft,fontSize:10,fontWeight:700,margin:"0 0 3px"}}, "N FACTURA ANTICIPO"),
            h("input", {type:"text", value:factAnt, onChange:function(e){setFactAnt(e.target.value);}, placeholder:"N factura (opcional)", style:merge(ib,{width:"100%"})})
          ),
          h("label", {style:{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13,color:T.textMid,paddingTop:16}},
            h("input", {type:"checkbox", checked:antPag, onChange:function(e){setAntPag(e.target.checked);}, style:{width:15,height:15,cursor:"pointer"}}),
            "Anticipo cobrado"
          )
        ),
        h("p", {style:{color:T.textSoft,fontSize:11,margin:"8px 0 0"}}, "Modificar el anticipo recalcula todas las cuotas.")
      ),

      /* cuotas header */
      h("p", {style:{color:T.textMid,fontSize:10,fontWeight:700,letterSpacing:".07em",margin:"0 0 7px"}}, "CUOTAS"),
      h("div", {className:"mgrid", style:{display:"grid",gridTemplateColumns:"18px 1fr 100px 100px 60px 22px",gap:5,paddingBottom:5,borderBottom:"1px solid "+T.border,marginBottom:7}},
        ["","Fecha","Monto","N Factura","",""].map(function(hdr,i){ return h("span", {key:i, style:{color:T.textSoft,fontSize:10,fontWeight:700}}, hdr); })
      ),

      cuotas.map(function(c, i) {
        return h("div", {key:c.id, className:"mgrid", style:{display:"grid",gridTemplateColumns:"18px 1fr 100px 100px 60px 22px",gap:5,alignItems:"center",marginBottom:7}},
          h("span", {style:{color:T.textSoft,fontSize:11,textAlign:"right"}}, i+1),
          h("div", {style:{display:"flex",gap:4,alignItems:"center"}},
            c.indefinida
              ? h("span", {style:{flex:1,padding:"6px 8px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,fontSize:12,color:T.textMid}}, "Indefinida")
              : h("input", {type:"date", value:c.fecha, onChange:function(e){updCuota(c.id,"fecha",e.target.value);}, style:{flex:1,background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,padding:"6px 8px",color:T.text,fontSize:12,outline:"none"}}),
            h("label", {style:{display:"flex",alignItems:"center",gap:2,cursor:"pointer",fontSize:10,color:T.textSoft,whiteSpace:"nowrap"}},
              h("input", {type:"checkbox", checked:!!c.indefinida, onChange:function(e){updCuota(c.id,"indefinida",e.target.checked);}, style:{cursor:"pointer"}}),
              "Indef"
            )
          ),
          h(MoneyInput, {value:c.monto, onChange:function(v){updCuota(c.id,"monto",v===""?0:v);}, style:ib}),
          h("input",    {type:"text", value:c.nroFactura||"", onChange:function(e){updCuota(c.id,"nroFactura",e.target.value);}, placeholder:"N factura", style:ib}),
          h("button",   {onClick:function(){updCuota(c.id,"pagada",!c.pagada);}, style:{padding:"5px 2px",borderRadius:8,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,background:c.pagada?"#dcfce7":"#fef9ec",color:c.pagada?"#15803d":"#b45309",whiteSpace:"nowrap"}}, c.pagada?"PAG":"PEND"),
          h("button",   {onClick:function(){remCuota(c.id);}, style:{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:17,padding:0,lineHeight:1}}, "x")
        );
      }),

      h("button", {onClick:addCuota, style:{width:"100%",padding:"7px",background:"transparent",border:"1px dashed "+T.borderMid,borderRadius:8,color:T.textMid,cursor:"pointer",marginTop:4,fontSize:13}},
        "+ Agregar cuota"
      ),

      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:14,borderTop:"1px solid "+T.border,flexWrap:"wrap",gap:8}},
        h("span", {style:{fontSize:13,fontWeight:600,color:Math.abs(diff)<2?"#16a34a":diff>0?"#dc2626":"#d97706"}},
          "Total: $ " + fmt(total) + (Math.abs(diff)<2?" OK":diff>0?" (excede $"+fmt(diff)+")": " (faltan $"+fmt(-diff)+")")
        ),
        h("div", {style:{display:"flex",gap:8}},
          h("button", {onClick:onClose, style:{padding:"8px 14px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:8,color:T.textMid,cursor:"pointer",fontSize:13}}, "Cancelar"),
          h("button", {onClick:function(){onSave(cuotas,anticipo,factAnt,antPag);}, style:{padding:"8px 16px",background:T.accent,border:"none",borderRadius:8,color:"white",cursor:"pointer",fontSize:13,fontWeight:600}}, "Guardar")
        )
      )
    )
  );
}

/* ─ TrabajoCard ──────────────────────────────────────── */
function TrabajoCard(props) {
  var t         = props.t;
  var onDelete  = props.onDelete;
  var onStatus  = props.onStatus;
  var onCuotas  = props.onCuotas;
  var onFactura = props.onFactura;
  var saving    = props.saving;

  var oState = useState(false);   var open = oState[0]; var setOpen = oState[1];
  var eState = useState(false);   var editFac = eState[0]; var setEditFac = eState[1];
  var fState = useState("");      var facVal  = fState[0]; var setFacVal  = fState[1];

  var st     = STATUS[t.estado] || STATUS.pendiente;
  var monto  = parseMoney(t.monto);
  var antici = parseMoney(t.anticipo);
  var cuotasCobradas = (t.cuotas||[]).filter(function(c){return c.pagada;})
                        .reduce(function(s,c){return s + parseMoney(c.monto);}, 0);
  var cobrado   = (t.anticipoPagado ? antici : 0) + cuotasCobradas;
  var pendiente = monto - antici - cuotasCobradas;
  var cpag = (t.cuotas||[]).filter(function(c){return c.pagada;}).length;
  var ctot = (t.cuotas||[]).length;

  return h("div", {style:{background:T.surface,border:"1px solid "+T.border,borderRadius:14,marginBottom:10,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.05)",opacity:saving?.65:1,transition:"opacity .2s"}},

    /* header row */
    h("div", {onClick:function(){setOpen(function(o){return !o;});}, style:{display:"flex",alignItems:"stretch",cursor:"pointer",userSelect:"none"}},
      h("div", {style:{width:6,background:st.dot,flexShrink:0,borderRadius:"14px 0 0 14px"}}),
      h("div", {style:{flex:1,display:"flex",alignItems:"center",gap:10,padding:"11px 13px",minWidth:0}},
        h("div", {style:{width:34,height:34,borderRadius:9,background:st.bg,border:"1.5px solid "+st.color+"55",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          h("div", {style:{width:13,height:13,borderRadius:"50%",background:st.dot,boxShadow:"0 0 5px "+st.dot+"88"}})
        ),
        h("div", {style:{flex:1,minWidth:0}},
          h("div", {style:{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}},
            h("span", {style:{fontWeight:700,color:T.text,fontSize:14,fontFamily:"'DM Serif Display',serif"}}, t.obra||""),
            h("span", {style:{padding:"1px 7px",borderRadius:20,background:st.bg,color:st.text,fontSize:10,fontWeight:700,border:"1px solid "+st.color+"44",whiteSpace:"nowrap"}}, st.label),
            t.facturado && h("span", {style:{padding:"1px 7px",borderRadius:20,background:"#f0fdf4",color:"#166534",fontSize:10,fontWeight:700,border:"1px solid #bbf7d0",whiteSpace:"nowrap"}}, "Fac #"+t.nroFactura)
          ),
          h("p", {style:{margin:"2px 0 0",color:T.textSoft,fontSize:11}},
            fmtFecha(t.fecha) + (t.descripcion ? " - " + t.descripcion.slice(0,50) + (t.descripcion.length>50?"...":"") : "")
          ),
          /* mobile amounts */
          h("div", {className:"qmobile"},
            h("span", {style:{fontSize:12,color:T.text,fontWeight:700,fontVariantNumeric:"tabular-nums"}}, "$ " + fmt(monto)),
            h("span", {style:{fontSize:12,color:pendiente>0?"#dc2626":"#16a34a",fontWeight:700,fontVariantNumeric:"tabular-nums"}}, "Pend: $ " + fmt(pendiente))
          )
        ),
        /* desktop amounts */
        h("div", {className:"qmoney"},
          h("div", {style:{textAlign:"right"}}, h("p",{style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:600}},"TOTAL"),    h("p",{style:{margin:0,color:T.text,fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(monto))),
          h("div", {style:{textAlign:"right"}}, h("p",{style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:600}},"COBRADO"),  h("p",{style:{margin:0,color:"#16a34a",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(cobrado))),
          h("div", {style:{textAlign:"right"}}, h("p",{style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:600}},"PENDIENTE"),h("p",{style:{margin:0,color:pendiente>0?"#dc2626":"#16a34a",fontSize:13,fontWeight:700,fontVariantNumeric:"tabular-nums"}},"$ "+fmt(pendiente))),
          ctot>0 && h("div", {style:{textAlign:"right"}}, h("p",{style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:600}},"CUOTAS"), h("p",{style:{margin:0,color:T.textMid,fontSize:13,fontWeight:700}},cpag+"/"+ctot))
        ),
        h("span", {style:{color:T.textSoft,fontSize:11,transition:"transform .25s",display:"inline-block",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0,marginLeft:4}}, "v")
      )
    ),

    /* expanded detail */
    open && h("div", {style:{borderTop:"1px solid "+T.border,padding:"13px 14px 15px",animation:"slideIn .2s ease-out"}},

      h("div", {className:"fgrid", style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:12}},
        [["Total",fmt(monto),T.text],["Anticipo",fmt(antici)+(t.anticipoPagado?" v":""),"#d97706"],["Saldo",fmt(monto-antici),T.accent],["Cobrado",fmt(cobrado),"#16a34a"],["Pendiente",fmt(pendiente),pendiente>0?"#dc2626":"#16a34a"]].map(function(item){
          return h("div", {key:item[0], style:{background:T.surfaceAlt,borderRadius:8,padding:"7px 9px",border:"1px solid "+T.border}},
            h("p", {style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:700,letterSpacing:".05em"}}, item[0].toUpperCase()),
            h("p", {style:{margin:"2px 0 0",color:item[2],fontSize:12,fontWeight:700,fontVariantNumeric:"tabular-nums"}}, "$ " + item[1])
          );
        }),
        ctot>0 && h("div", {style:{background:T.surfaceAlt,borderRadius:8,padding:"7px 9px",border:"1px solid "+T.border}},
          h("p", {style:{margin:0,color:T.textSoft,fontSize:9,fontWeight:700,letterSpacing:".05em"}}, "CUOTAS"),
          h("p", {style:{margin:"2px 0 0",color:T.textMid,fontSize:12,fontWeight:700}}, cpag+"/"+ctot)
        )
      ),

  var atState = useState("trabajos"); var activeTab = atState[0]; var setActiveTab = atState[1];
  var cmState = useState(null);   var cuotasModal = cmState[0]; var setCuotasModal = cmState[1];
  var aeState = useState("");     var apiError  = aeState[0]; var setApiError  = aeState[1];
  var bqState = useState("");     var busqueda  = bqState[0]; var setBusqueda  = bqState[1];

  var emptyForm = {fecha:todayStr(),obra:"",descripcion:"",estado:"pendiente",monto:"",anticipo:"",cantCuotas:"1"};
  var fmState = useState(emptyForm); var form = fmState[0]; var setForm = fmState[1];
  var sdState = useState(false);  var saved = sdState[0]; var setSaved = sdState[1];

  var loadTrabajos = useCallback(function() {
    setLoading(true); setApiError("");
    api.get("getAll").then(function(res) {
      if (res.error) { setApiError("Error: " + res.error); setTrabajos([]); }
      else setTrabajos(res.trabajos || []);
      setLoading(false);
    }).catch(function() { setApiError("No se pudo conectar con la API."); setLoading(false); });
  }, []);

  useEffect(function(){ if (loggedIn) loadTrabajos(); }, [loggedIn]);

  function setField(k, v) { setForm(function(f){ return setKey(f, k, v); }); }

  function calcCuotas(monto, anticipo, cant, fecha) {
    var s = parseMoney(monto) - parseMoney(anticipo);
    var n = Math.max(1, parseInt(cant) || 1);
    return Array.from({length:n}, function(_, i) {
      return {id:i+1, fecha:cuotaDate(fecha||todayStr(),i), indefinida:false, monto:Math.round(s/n), pagada:false, nroFactura:""};
    });
  }

  function handleAdd() {
    if (!form.obra.trim()) return;
    setSaving(true);
    var nuevo = merge(form, {
      id: String(Date.now()),
      monto: parseMoney(form.monto),
      anticipo: parseMoney(form.anticipo),
      cantCuotas: parseInt(form.cantCuotas) || 1,
      facturado: false, nroFactura: "",
      anticipoPagado: false, facturaAnticipo: "",
      cuotas: calcCuotas(form.monto, form.anticipo, form.cantCuotas, form.fecha)
    });
    api.post("save", {data: nuevo}).then(function(res) {
      if (res.ok) { setTrabajos(function(p){ return [nuevo].concat(p); }); setForm(emptyForm); setSaved(true); setTimeout(function(){setSaved(false);}, 2000); }
      else setApiError("Error al guardar: " + res.error);
      setSaving(false);
    }).catch(function(){ setApiError("Error de conexion."); setSaving(false); });
  }

  function updateRemote(upd) {
    setSavingId(upd.id);
    api.post("update", {data: upd}).then(function(res){ if(!res.ok) setApiError("Error al actualizar."); setSavingId(null); })
      .catch(function(){ setApiError("Error."); setSavingId(null); });
  }

  function handleDelete(id) {
    if (!window.confirm("Eliminar este trabajo?")) return;
    setSavingId(id);
    api.post("delete", {id: id}).then(function(res){
      if (res.ok) setTrabajos(function(t){ return t.filter(function(x){ return x.id !== id; }); });
      else setApiError("Error al eliminar.");
      setSavingId(null);
    }).catch(function(){ setApiError("Error."); setSavingId(null); });
  }

  function handleStatus(id, estado) {
    var updated = trabajos.map(function(t){ return t.id===id ? merge(t,{estado:estado}) : t; });
    setTrabajos(updated);
    updateRemote(updated.filter(function(t){ return t.id===id; })[0]);
  }

  function handleSaveCuotas(id, cuotas, anticipo, facturaAnticipo, anticipoPagado) {
    var updated = trabajos.map(function(t){ return t.id===id ? merge(t,{cuotas:cuotas,anticipo:anticipo,facturaAnticipo:facturaAnticipo,anticipoPagado:anticipoPagado}) : t; });
    setTrabajos(updated);
    updateRemote(updated.filter(function(t){ return t.id===id; })[0]);
    setCuotasModal(null);
  }

  function handleFactura(id, nro) {
    var updated = trabajos.map(function(t){ return t.id===id ? merge(t,{facturado:true,nroFactura:nro}) : t; });
    setTrabajos(updated);
    updateRemote(updated.filter(function(t){ return t.id===id; })[0]);

    }
    return list;

      var a  = parseMoney(t.anticipo);
      var cc = (t.cuotas||[]).filter(function(c){return c.pagada;}).reduce(function(s,c){return s+parseMoney(c.monto);},0);

              : trabajosFiltrados.length===0
                ? h("div", {style:{textAlign:"center",padding:46,color:T.textSoft,background:T.surface,borderRadius:14,border:"1px solid "+T.border}},
                    h("p", {style:{margin:0,fontSize:14,color:T.textMid}}, busqueda ? "Sin resultados para \""+busqueda+"\"" : "Sin trabajos registrados"),
                    busqueda && h("button", {onClick:function(){setBusqueda("");}, style:{marginTop:9,padding:"6px 13px",background:T.accentBg,border:"1px solid #bfdbfe",borderRadius:8,color:T.accent,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}, "Limpiar busqueda")
                  )
                : trabajosFiltrados.map(function(t) {
                    return h(TrabajoCard, {key:t.id, t:t, saving:savingId===t.id, onDelete:handleDelete, onStatus:handleStatus, onCuotas:setCuotasModal, onFactura:handleFactura});
                  })
          )
        ),

    /* modal */
    cuotasModal && h(CuotasModal, {
      trabajo: cuotasModal,
      onSave: function(cuotas,ant,factAnt,antPag){ handleSaveCuotas(cuotasModal.id,cuotas,ant,factAnt,antPag); },
      onClose: function(){ setCuotasModal(null); }
    }),

    /* footer contador */
    h("div", {style:{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:"linear-gradient(135deg,#1e293b,#0f172a)",borderTop:"1px solid #334155",padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,boxShadow:"0 -4px 16px rgba(0,0,0,.2)"}},
      h("div", {style:{display:"flex",alignItems:"center",gap:9}},
        h("div", {style:{width:9,height:9,borderRadius:"50%",background:totalPendiente>0?"#f59e0b":"#4ade80",boxShadow:"0 0 7px "+(totalPendiente>0?"#f59e0b":"#4ade80"),animation:"pulse 2s infinite"}}),
        h("span", {style:{color:"#94a3b8",fontSize:12,fontWeight:600}},
          trabajos.length + " trabajo" + (trabajos.length!==1?"s":"") + " registrado" + (trabajos.length!==1?"s":"")
        )
      ),
      h("div", {style:{display:"flex",alignItems:"center",gap:10}},
        h("span", {style:{color:"#64748b",fontSize:12}}, "Total pendiente de cobro:"),
        h("span", {style:{color:totalPendiente>0?"#fbbf24":"#4ade80",fontSize:17,fontWeight:700,fontVariantNumeric:"tabular-nums"}},
          "$ " + fmt(totalPendiente)
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App, null));

})();
</script>
</body>
</html>
